<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="A story-driven browser game that teaches algorithms, data structures, and CS techniques. Program a robot to save a starship — 18 chapters, real JavaScript, no blocks.">
<meta property="og:type" content="website">
<meta property="og:title" content="Code Story — learn algorithms by saving a starship">
<meta property="og:description" content="18 chapters of real JavaScript: search, sorting, stacks, queues, hash maps, BFS, Dijkstra, dynamic programming, parsing — taught by a story with randomized trials that fail memorized answers.">
<meta property="og:url" content="https://raja-donthireddy.github.io/Code-Story/">
<meta property="og:image" content="https://raja-donthireddy.github.io/Code-Story/screenshot.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Code Story — learn algorithms by saving a starship">
<meta name="twitter:description" content="18 chapters of real JavaScript, taught by a story with randomized trials that fail memorized answers.">
<meta name="twitter:image" content="https://raja-donthireddy.github.io/Code-Story/screenshot.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='15' y='15' width='70' height='70' rx='12' fill='%2353d6c6'/><rect x='38' y='30' width='24' height='14' rx='3' fill='%23062521'/></svg>">
</head>
<body>
<!-- ARTIFACT-START -->
<title>Code Story — Signal Lost</title>
<style>
  :root{
    --bg:#070b12; --panel:#0e1520; --panel2:#0a101a; --line:#1c2939; --line2:#243549;
    --text:#c9d5e0; --muted:#71818f; --accent:#53d6c6; --accent-dim:#2b6e66;
    --amber:#e0a458; --good:#66d188; --bad:#e5545e;
    --mono:ui-monospace,"SFMono-Regular","Cascadia Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.5;min-height:100vh}
  button{font-family:var(--mono);cursor:pointer}
  button:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .brand{font-weight:700;letter-spacing:.18em;font-size:15px;white-space:nowrap}
  .brand .sub{color:var(--amber);font-weight:400;letter-spacing:.12em}
  .brand .dot{color:var(--accent)}
  #chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{background:var(--panel);border:1px solid var(--line2);color:var(--muted);padding:4px 10px;font-size:12px;letter-spacing:.06em;border-radius:2px}
  .chip:not(:disabled):hover{border-color:var(--accent-dim);color:var(--text)}
  .chip.cur{border-color:var(--accent);color:var(--accent)}
  .chip.done::after{content:" ✓";color:var(--good)}
  .chip:disabled{opacity:.35;cursor:not-allowed}
  .hbtn{background:none;border:1px solid var(--line2);color:var(--muted);padding:4px 10px;font-size:12px;letter-spacing:.08em;border-radius:2px}
  .hbtn:hover{color:var(--text);border-color:var(--accent-dim)}
  .hbtn.on{border-color:var(--accent);color:var(--accent)}
  #hright{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
  #nextBtn{display:none}
  #nextBtn.waiting{border-color:var(--amber);color:var(--amber);animation:pulse 1.2s ease-in-out infinite}

  /* ---------- layout ---------- */
  main{display:grid;grid-template-columns:var(--mission-w,310px) 7px minmax(0,1fr) 7px var(--right-w,430px);
    gap:0;min-height:calc(100vh - 49px)}
  main>*{min-width:0}
  @media (max-width:1150px){
    main{grid-template-columns:1fr;min-height:0}
    #mission{border-right:none;border-bottom:1px solid var(--line)}
    #right{border-left:none;border-top:1px solid var(--line)}
    #edwrap{min-height:220px}
    main>.resizer{display:none}
  }

  /* ---------- drag-to-resize handles ---------- */
  .resizer{position:relative;cursor:col-resize;touch-action:none;background:transparent;z-index:6}
  .resizer::after{content:"";position:absolute;background:var(--line2)}
  .resizer:hover::after,.resizer:focus-visible::after,.resizer.active::after{background:var(--accent)}
  .resizer:not(.resizer-h)::after{top:0;bottom:0;left:3px;width:1px}
  .resizer.resizer-h{cursor:row-resize;height:7px}
  .resizer.resizer-h::after{left:0;right:0;top:3px;height:1px}
  .resizer:focus-visible{outline:none}
  .resizer:focus-visible::after{box-shadow:0 0 0 1px var(--accent)}
  body.resizing-x,body.resizing-x *{cursor:col-resize!important;user-select:none!important}
  body.resizing-y,body.resizing-y *{cursor:row-resize!important;user-select:none!important}

  /* ---------- mission panel ---------- */
  #mission{border-right:1px solid var(--line);padding:18px;overflow-y:auto;background:var(--panel2)}
  .kicker{font-size:11px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
  #lv-title{font-size:19px;font-weight:700;letter-spacing:.04em;margin:2px 0 2px;text-wrap:balance}
  #lv-concept{display:inline-block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-dim);padding:2px 8px;border-radius:2px;margin-bottom:14px}
  .comms{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .comms .who{font-size:11px;letter-spacing:.16em;margin-bottom:1px}
  .comms .halcyon .who{color:var(--amber)}
  .comms .byte .who{color:var(--accent)}
  .comms .you .who{color:var(--muted)}
  .comms .say{font-family:var(--sans);font-size:13.5px;color:var(--text);max-width:62ch}
  .comms .halcyon .say{color:var(--amber);opacity:.9}
  .box{border:1px solid var(--line2);border-radius:2px;padding:10px 12px;margin-bottom:14px;background:var(--panel)}
  .box .bt{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  #lv-objective{font-family:var(--sans);font-size:13.5px}
  #lv-budget{color:var(--amber);font-size:12.5px;margin-top:6px}
  #lv-side{margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
  .sidebtn{background:var(--panel);border:1px solid var(--line2);border-left:2px solid var(--amber);color:var(--text);
    padding:8px 12px;font-size:12.5px;text-align:left;border-radius:2px;letter-spacing:.02em}
  .sidebtn:hover{border-color:var(--amber)}
  .sidebtn.done{border-left-color:var(--good)}
  .sidebtn .sb-k{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);display:block}
  .sidebtn.done .sb-k{color:var(--good)}
  #lv-api{display:flex;flex-direction:column;gap:8px}
  #lv-api .fn{font-size:12.5px}
  #lv-api .sig{color:var(--accent)}
  #lv-api .doc{color:var(--muted);font-family:var(--sans);font-size:12.5px}

  /* ---------- viewport ---------- */
  #viewport{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:
    radial-gradient(ellipse 90% 70% at 50% 30%, #0b1322 0%, var(--bg) 70%);position:relative;overflow:auto}
  #hud{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
  #hud b{color:var(--text);font-weight:400}
  #gridwrap{position:relative}
  #grid{position:relative;display:grid;gap:2px}
  .tile{width:40px;height:40px;border-radius:2px;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column}
  .t-wall{background:#1a2740;border:1px solid #2a3a58;box-shadow:inset 0 2px 0 rgba(255,255,255,.05)}
  .t-floor{background:#090f1a;border:1px solid #101a29}
  .t-console{background:#0a1a1c;border:1px solid var(--accent-dim);animation:pulse 1.6s ease-in-out infinite}
  .t-console::before{content:"▣";color:var(--accent);font-size:18px}
  .t-airlock{background:#0a1a1c;border:1px solid var(--accent-dim);animation:pulse 1.6s ease-in-out infinite}
  .t-airlock::before{content:"◎";color:var(--accent);font-size:18px}
  .t-debris{background:#0a111d;border:1px solid #3a2a1c}
  .t-debris::before{content:"◆";color:var(--amber);font-size:15px}
  .t-cell,.t-cabinet,.t-crate{background:#0d1626;border:1px solid #22304a}
  .t-cell::before{content:"▮";color:#41546e;font-size:13px}
  .t-cell.revealed.dead{border-color:var(--bad)}
  .t-cell.revealed.dead::before{color:var(--bad)}
  .t-cell.revealed.live::before{color:var(--good)}
  .t-cell.fixed{border-color:var(--good);background:#0c1f16}
  .t-cell.fixed::before{content:"▮";color:var(--good)}
  .t-cabinet::before{content:"▤";color:#41546e;font-size:14px}
  .t-cabinet.revealed::before{color:var(--accent)}
  .t-cabinet.open-ok{border-color:var(--good);background:#0c1f16}
  .t-cabinet.open-bad{border-color:var(--bad);background:#241014}
  .t-crate::before{content:"▦";color:#5b6d85;font-size:15px}
  .t-crate.revealed::before{color:var(--accent)}
  .t-crate.sorted{border-color:var(--good)}
  .t-crate.sorted::before{color:var(--good)}
  .t-seal{background:#0d1626;border:1px solid #22304a}
  .t-seal::before{content:"▬";color:#41546e;font-size:13px}
  .t-seal.revealed::before{color:var(--amber)}
  .t-pod{background:#0d1626;border:1px solid #22304a}
  .t-pod::before{content:"❆";color:#41546e;font-size:14px}
  .t-pod.revealed.alert::before{color:var(--amber)}
  .t-node{background:#0d1626;border:1px solid #22304a}
  .t-node::before{content:"◉";color:#5b6d85;font-size:13px}
  .t-node.corrupt{border-color:#5a2a30}
  .t-node.corrupt::before{color:var(--bad)}
  .t-record{background:#0d1626;border:1px solid #22304a}
  .t-record::before{content:"▤";color:#41546e;font-size:12px}
  .t-record.revealed::before{color:var(--accent)}
  .t-rad{background:#0d1420;border:1px solid #1c2939}
  .t-rad .tlabel{font-size:11px;margin-top:0}
  .rad-l{background:#0b1a14;border-color:#1e3a2b}
  .rad-l .tlabel{color:#7fd9a0}
  .rad-m{background:#181409;border-color:#3a2f18}
  .rad-m .tlabel{color:#e0c078}
  .rad-h{background:#1d0e10;border-color:#4a2028}
  .rad-h .tlabel{color:#e58a92}
  .t-sys{background:#0d1626;border:1px solid #22304a}
  .t-sys::before{content:"◈";color:#5b6d85;font-size:13px}
  .goalcell{border-color:var(--accent-dim);animation:pulse 1.6s ease-in-out infinite}
  .tile.mark-ok{border-color:var(--good);background:#0c1f16}
  .tile.mark-ok::before{color:var(--good)}
  .tile.mark-bad{border-color:var(--bad);background:#241014}
  .tile.mark-bad::before{color:var(--bad)}
  .tile.mark-dim{opacity:.3}
  .tlabel{font-size:9px;line-height:1;color:var(--muted);margin-top:1px;font-variant-numeric:tabular-nums}
  .tidx{position:absolute;top:1px;left:3px;font-size:8px;line-height:1;color:#42546d;font-variant-numeric:tabular-nums}
  .sdiv{color:var(--muted);font-size:10px;letter-spacing:.14em;align-self:center;padding:0 4px;user-select:none}
  .revealed .tlabel{color:var(--text)}
  .tile.ping{box-shadow:0 0 0 2px var(--accent)}
  @keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(83,214,198,.15)}50%{box-shadow:0 0 14px rgba(83,214,198,.5)}}
  #robot{position:absolute;width:40px;height:40px;transition:transform .13s linear;z-index:5;pointer-events:none}
  #robot .body{position:absolute;inset:6px;background:var(--accent);border-radius:4px;transition:transform .13s linear;
    box-shadow:0 0 12px rgba(83,214,198,.55)}
  #robot .body::before{content:"";position:absolute;top:3px;left:50%;transform:translateX(-50%);width:8px;height:5px;background:#062521;border-radius:1px}
  #robot.bump .body{background:var(--bad);box-shadow:0 0 12px rgba(229,84,94,.6)}
  #robot.win .body{background:var(--good);box-shadow:0 0 18px rgba(102,209,136,.8)}
  @media (prefers-reduced-motion:reduce){
    #robot,#robot .body{transition:none}
    .t-console,.t-airlock{animation:none}
  }

  /* ---------- right: editor + console ---------- */
  #right{border-left:1px solid var(--line);display:flex;flex-direction:column;background:var(--panel2)}
  #edhead{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line)}
  #edhead .fname{font-size:12px;letter-spacing:.12em;color:var(--muted)}
  #edhead .fname b{color:var(--text);font-weight:400}
  #edhead .spacer{flex:1}
  .btn{border:1px solid var(--line2);background:var(--panel);color:var(--text);padding:5px 14px;font-size:12px;letter-spacing:.1em;border-radius:2px;text-transform:uppercase}
  .btn:hover{border-color:var(--accent-dim)}
  .btn.primary{border-color:var(--accent);color:var(--accent)}
  .btn.primary:hover{background:rgba(83,214,198,.08)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  #edwrap{flex:1;min-height:260px;display:flex;overflow:hidden;background:var(--panel2)}
  #gutter{width:40px;flex:none;overflow:hidden;border-right:1px solid var(--line);background:var(--panel2)}
  #gutterin{padding:12px 8px 12px 4px;text-align:right;color:#3b4c61;font-size:13.5px;line-height:1.6;white-space:pre;font-variant-numeric:tabular-nums}
  #edstack{position:relative;flex:1;overflow:hidden}
  #editor,#hl{position:absolute;inset:0;margin:0;border:none;font-family:var(--mono);font-size:13.5px;
    line-height:1.6;padding:12px 14px;tab-size:2;white-space:pre;overflow:auto;letter-spacing:normal}
  #editor{resize:none;background:transparent;color:transparent;caret-color:var(--accent);z-index:2;word-wrap:normal}
  #editor::selection{background:rgba(83,214,198,.25)}
  #hl{z-index:1;pointer-events:none;background:var(--panel2);color:var(--text);overflow:hidden}
  #hl .ln{display:block}
  #hl .ln.active{background:rgba(224,164,88,.16);box-shadow:inset 2px 0 0 0 var(--amber)}
  #hl .cm{color:#4e5f70}
  #hl .st{color:var(--amber)}
  #hl .kw{color:var(--accent)}
  #hl .nm{color:#86b8e8}
  #hl .fn{color:#e2ecf5}
  #editor.err-flash{animation:errsh .18s linear 2}
  @keyframes errsh{25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
  #console{height:var(--console-h,210px);flex:none;overflow-y:auto;border-top:1px solid var(--line);padding:10px 14px;background:#060a10;font-size:12.5px;line-height:1.7}
  #console div{white-space:pre-wrap;word-break:break-word}
  .c-info{color:var(--muted)} .c-err{color:var(--bad)} .c-ok{color:var(--good)}
  .c-report{color:var(--accent)} .c-warn{color:var(--amber)}

  /* ---------- modal ---------- */
  #overlay{position:fixed;inset:0;background:rgba(4,7,12,.78);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  #overlay.show{display:flex}
  #modal{background:var(--panel);border:1px solid var(--line2);border-top:2px solid var(--accent);max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:26px 30px;border-radius:2px}
  #modal .kicker{color:var(--accent)}
  #modal h2{margin:4px 0 14px;font-size:20px;letter-spacing:.03em;text-wrap:balance}
  #modal .mbody{font-family:var(--sans);font-size:14px;color:var(--text)}
  #modal .mbody p{margin:0 0 12px;max-width:60ch}
  #modal .mbody ul{margin:0 0 12px;padding-left:20px}
  #modal .mbody li{margin-bottom:6px;max-width:56ch}
  #modal .mbody code{font-family:var(--mono);font-size:12.5px;color:var(--accent);background:#0a141c;padding:1px 5px;border-radius:2px}
  #modal .real{border-left:2px solid var(--amber);padding:8px 12px;margin:14px 0;background:rgba(224,164,88,.06)}
  #modal .real .bt{font-size:11px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
  #modal .actions{display:flex;justify-content:flex-end;margin-top:18px;gap:10px}

  /* ---------- "how it works" box (mission panel) ---------- */
  .box.how{border-color:var(--accent-dim);background:rgba(83,214,198,.04)}
  #lv-how-text{font-family:var(--sans);font-size:13px;color:var(--text);line-height:1.5}
  #lv-how-complexity{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .cplx{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--accent);
    border:1px solid var(--accent-dim);border-radius:2px;padding:2px 7px;background:rgba(83,214,198,.06)}
  .learnlink{display:block;margin-top:10px;background:none;border:none;color:var(--accent);
    font-family:var(--sans);font-size:12.5px;text-align:left;padding:0;cursor:pointer;letter-spacing:.01em}
  .learnlink:hover{text-decoration:underline}

  /* ---------- Learn reference library ---------- */
  #learnView{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column}
  #learnView.show{display:flex}
  .lv-head{display:flex;align-items:center;gap:16px;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--panel2);flex:none}
  .lv-headtitle{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--text)}
  .lv-headtitle span{color:var(--muted);text-transform:none;letter-spacing:0;font-size:12.5px}
  .lv-body{flex:1;display:grid;grid-template-columns:var(--lvnav-w,270px) 7px minmax(0,1fr);overflow:hidden}
  #lvNav{overflow-y:auto;background:var(--panel2);padding:10px 0}
  .lv-season{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:14px 16px 6px}
  .lv-navitem{display:block;width:100%;text-align:left;background:none;border:none;border-left:2px solid transparent;
    color:var(--text);padding:8px 16px;font-family:var(--sans);font-size:13px;cursor:pointer}
  .lv-navitem:hover{background:rgba(255,255,255,.03)}
  .lv-navitem.cur{border-left-color:var(--accent);color:var(--accent);background:rgba(83,214,198,.06)}
  .lv-navitem .k{display:block;font-size:10.5px;color:var(--muted);letter-spacing:.06em}
  .lv-navitem.cur .k{color:var(--accent-dim)}
  #lvDetail{overflow-y:auto;padding:28px 40px 60px}
  .lv-eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
  .lv-h1{font-size:26px;font-weight:700;margin:6px 0 4px;text-wrap:balance}
  .lv-oneliner{font-family:var(--sans);font-size:15px;color:var(--muted);max-width:64ch;margin-bottom:20px}
  .lv-section{max-width:68ch;margin-bottom:22px}
  .lv-section h3{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:0 0 8px}
  .lv-section p{font-family:var(--sans);font-size:14px;line-height:1.65;color:var(--text);margin:0 0 10px}
  .lv-code{font-family:var(--mono);font-size:12.5px;line-height:1.7;background:#080d15;border:1px solid var(--line);
    border-radius:3px;padding:12px 16px;white-space:pre;overflow-x:auto;max-width:68ch;color:var(--text)}
  .lv-code .kw{color:var(--accent)} .lv-code .cm{color:#4e5f70}
  .lv-cplx-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:22px}
  .lv-cplx-item{border:1px solid var(--line2);border-radius:3px;padding:8px 14px}
  .lv-cplx-item .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .lv-cplx-item .val{font-family:var(--mono);font-size:18px;color:var(--accent)}
  .lv-try{display:inline-block;margin-top:4px;border:1px solid var(--accent-dim);color:var(--accent);
    border-radius:2px;padding:6px 14px;font-size:12.5px;text-decoration:none;letter-spacing:.03em}
  .lv-try:hover{background:rgba(83,214,198,.08)}

  /* ---------- visualization player ---------- */
  .viz{border:1px solid var(--line);border-radius:4px;background:var(--panel2);padding:20px;max-width:74ch}
  .viz-row{display:flex;align-items:flex-end;gap:4px;margin-bottom:6px;overflow-x:auto;padding-bottom:4px}
  .viz-rowlabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    width:70px;flex:none;align-self:center}
  .vcell{flex:none;min-width:34px;display:flex;flex-direction:column;align-items:center}
  .vtags{height:13px;font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--amber);white-space:nowrap}
  .vbox{min-width:34px;height:34px;padding:0 6px;border:1px solid var(--line2);border-radius:2px;background:#0d1626;
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;color:var(--text);
    transition:background .15s,border-color .15s,transform .15s}
  .vsub{font-size:9px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}

<script>
"use strict";
/* ============================================================
   CODE STORY — SIGNAL LOST
   A playable prototype that teaches algorithms through a
   robot-programming story. Everything is self-contained.
   ============================================================ */

const TILE = 40, GAP = 2, PITCH = TILE + GAP;
const DIRS = [[0,-1],[1,0],[0,1],[-1,0]]; // N E S W
const OPS_MAX = 20000, GUARD_MAX = 100000;

/* ---------- seeded rng ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const ri=(rng,min,max)=>min+Math.floor(rng()*(max-min+1));

/* ---------- world helpers ---------- */
function emptyWorld(w,h){
  const tiles=[];
  for(let y=0;y<h;y++){tiles.push([]);for(let x=0;x<w;x++)tiles[y].push({type:'wall'});}
  return {w,h,tiles,robot:null,meta:{}};
}
function worldFromRows(rows){
  const h=rows.length,w=rows[0].length,world=emptyWorld(w,h);
  const rchars={'>':1,'<':3,'^':0,'v':2};
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const c=rows[y][x],t=world.tiles[y][x];
    if(c==='#'){t.type='wall';continue;}
    t.type='floor';
    if(c==='C')t.type='console';
    if(c in rchars)world.robot={x,y,dir:rchars[c]};
  }
  return world;
}
const tileAt=(world,x,y)=>(x<0||y<0||x>=world.w||y>=world.h)?{type:'wall'}:world.tiles[y][x];
function classify(world,x,y){
  const t=tileAt(world,x,y);
  if(t.type==='wall')return'wall';
  if(t.type==='console')return'console';
  if(t.type==='debris')return'debris';
  if(t.type==='airlock')return'airlock';
  return'clear';
}
const onType=(sim,ty)=>sim.world.robot&&tileAt(sim.world,sim.world.robot.x,sim.world.robot.y).type===ty;

/* ---------- execution machinery ---------- */
class StopRun extends Error{}
/* Both live error traces (describeError) and in-flight action tagging
   (opTick, for step-mode line highlighting) resolve a source line the
   same way: find the frame inside the user's compiled Function and
   undo the Function-constructor's 3-line preamble. */
function stackLine(stack){
  const m=/(?:<anonymous>|Function[^:]*):(\d+):\d+/.exec(stack||'');
  if(!m)return null;
  const ln=+m[1]-3;
  return ln>=1?ln:null;
}
function curUserLine(){return stackLine(new Error().stack);}
function maybeWin(sim){
  if(!sim.level.winAtEnd&&sim.level.win(sim)){
    sim.won=true;sim.actions.push({t:'win'});throw new StopRun();
  }
}
function opTick(sim){
  sim.curLine=curUserLine();
  if(++sim.ops>OPS_MAX)throw new Error(`Byte executed ${OPS_MAX.toLocaleString()} operations without completing the objective, then powered down to save the battery.`);
}
const bump=(sim,k)=>{sim.counts[k]=(sim.counts[k]||0)+1;};

/* Inject __guard() into every loop body so infinite loops halt
   with a friendly error instead of freezing the tab. */
function injectGuards(src){
  let out='',i=0;
  while(i<src.length){
    const ch=src[i];
    if(ch==='"'||ch==="'"||ch==='`'){const q=ch;out+=ch;i++;
      while(i<src.length){if(src[i]==='\\'){out+=src[i]+(src[i+1]??'');i+=2;continue;}out+=src[i];if(src[i]===q){i++;break;}i++;}continue;}
    if(ch==='/'&&src[i+1]==='/'){while(i<src.length&&src[i]!=='\n')out+=src[i++];continue;}
    if(ch==='/'&&src[i+1]==='*'){while(i<src.length&&!(src[i]==='*'&&src[i+1]==='/'))out+=src[i++];out+='*/';i+=2;continue;}
    if(/[A-Za-z_$]/.test(ch)){
      let j=i;while(j<src.length&&/[A-Za-z0-9_$]/.test(src[j]))j++;
      const word=src.slice(i,j);
      const prev=out.length?out[out.length-1]:'';
      out+=word;i=j;
      if(/[A-Za-z0-9_$.]/.test(prev))continue; // part of a longer identifier / property
      if(word==='for'||word==='while'){
        while(i<src.length&&/\s/.test(src[i]))out+=src[i++];
        if(src[i]!=='(')continue;
        let depth=0;
        do{if(src[i]==='(')depth++;else if(src[i]===')')depth--;out+=src[i++];}while(i<src.length&&depth>0);
        while(i<src.length&&/\s/.test(src[i]))out+=src[i++];
        if(src[i]==='{'){out+='{__guard();';i++;}
        else if(src[i]===';'){out+=src[i++];} // do{}while(x); or empty body
        else{ // single-statement body
          out+='{__guard();';
          let d2=0;
          while(i<src.length){const c=src[i];out+=c;
            if(c==='('||c==='['||c==='{')d2++;
            if(c===')'||c===']'||c==='}')d2--;
            i++;if(c===';'&&d2<=0)break;}
          out+='}';
        }
      }else if(word==='do'){
        while(i<src.length&&/\s/.test(src[i]))out+=src[i++];
        if(src[i]==='{'){out+='{__guard();';i++;}
      }else if(word==='function'){
        // guard function bodies too, so runaway RECURSION halts
        // as gracefully as runaway loops
        let j=i;
        while(j<src.length&&/\s/.test(src[j]))j++;
        if(/[A-Za-z_$]/.test(src[j]||'')){j++;while(j<src.length&&/[A-Za-z0-9_$]/.test(src[j]))j++;}
        while(j<src.length&&/\s/.test(src[j]))j++;
        if(src[j]==='('){
          let depth=0;
          do{if(src[j]==='(')depth++;else if(src[j]===')')depth--;j++;}while(j<src.length&&depth>0);
          while(j<src.length&&/\s/.test(src[j]))j++;
          if(src[j]==='{'){out+=src.slice(i,j+1)+'__guard();';i=j+1;}
        }
      }
      continue;
    }
    if(ch==='='&&src[i+1]==='>'){
      out+='=>';i+=2;
      let j=i;
      while(j<src.length&&/\s/.test(src[j]))j++;
      if(src[j]==='{'){out+=src.slice(i,j+1)+'__guard();';i=j+1;}
      continue;
    }
    out+=ch;i++;
  }
  return out;
}

function runTrial(level,seed,code,ti){
  const world=level.build(mulberry32(seed),ti||0);
  const sim={world,level,actions:[],ops:0,won:false,failed:null,compileError:false,counts:{},curLine:null};
  /* tag every pushed action with the source line active when it fired,
     for step-mode highlighting — one hook point instead of touching
     every level's dozens of sim.actions.push(...) call sites */
  const rawPush=sim.actions.push.bind(sim.actions);
  sim.actions.push=(obj)=>rawPush(Object.assign(obj,{line:sim.curLine}));
  const api=level.makeApi(sim);
  api.report=(msg)=>{opTick(sim);sim.actions.push({t:'report',msg:String(msg)});};
  let fn;
  try{
    fn=new Function(...Object.keys(api),'__guard','"use strict";\n'+injectGuards(code)+'\n');
  }catch(e){
    const br=bracketReport(code);
    sim.failed='Syntax error — '+e.message+(br?`   (hint: ${br})`:'');
    sim.compileError=true;return sim;
  }
  let g=0;
  const guard=()=>{if(++g>GUARD_MAX)throw new Error(`The program looped (or recursed) ${GUARD_MAX.toLocaleString()} times without finishing — an infinite loop, unbounded recursion, or a brute force that recomputes the same subproblems. Check your exit or base condition — or remember answers you've already computed.`);};
  try{fn(...Object.values(api),guard);}
  catch(e){if(!(e instanceof StopRun))sim.failed=describeError(e,code);}
  /* !sim.failed guard: an uncaught error already produced a precise
     message (describeError) — a winAtEnd check must never overwrite
     it with a generic "objective not met" diagnostic. */
  if(!sim.won&&!sim.failed&&level.winAtEnd&&level.win(sim)){sim.won=true;sim.actions.push({t:'win'});}
  return sim;
}

/* ---------- shared robot command set ---------- */
function movementApi(sim,opts={}){
  const ahead=(turn=0)=>{
    const r=sim.world.robot,d=(r.dir+turn+4)%4;
    return {x:r.x+DIRS[d][0],y:r.y+DIRS[d][1]};
  };
  const api={
    move(){opTick(sim);const p=ahead(),c=classify(sim.world,p.x,p.y);
      if(c==='debris')throw new Error('CRUNCH. Byte drove straight into debris. Chassis integrity warning — trial failed. (Byte can scan() before moving.)');
      if(c==='wall'){sim.actions.push({t:'bump'});return;}
      sim.world.robot.x=p.x;sim.world.robot.y=p.y;
      sim.actions.push({t:'move',x:p.x,y:p.y});bump(sim,'moves');maybeWin(sim);},
    turnLeft(){opTick(sim);sim.world.robot.dir=(sim.world.robot.dir+3)%4;sim.actions.push({t:'turn',dir:sim.world.robot.dir});},
    turnRight(){opTick(sim);sim.world.robot.dir=(sim.world.robot.dir+1)%4;sim.actions.push({t:'turn',dir:sim.world.robot.dir});},
  };
  if(opts.scan)api.scan=()=>{opTick(sim);const p=ahead(),c=classify(sim.world,p.x,p.y);sim.actions.push({t:'ping',x:p.x,y:p.y});bump(sim,'scans');return c;};
  if(opts.sideScan){
    api.scanLeft=()=>{opTick(sim);const p=ahead(-1),c=classify(sim.world,p.x,p.y);sim.actions.push({t:'ping',x:p.x,y:p.y});bump(sim,'scans');return c;};
    api.scanRight=()=>{opTick(sim);const p=ahead(1),c=classify(sim.world,p.x,p.y);sim.actions.push({t:'ping',x:p.x,y:p.y});bump(sim,'scans');return c;};
  }
  return api;
}
function checkIndex(i,n,fname){
  if(!Number.isInteger(i)||i<0||i>=n)
    throw new Error(`${fname}(${i}) — there is no slot ${i}. Valid indices run from 0 to ${n-1}. (Programmers count from zero.)`);
}

/* ---------- grid-graph helpers (used by Season 3 builders) ---------- */
function gridSolve(world,s,g,costFn){
  // Dijkstra over open tiles; costFn(x,y) = cost of ENTERING a tile
  // (1 everywhere = BFS). Returns {cost, route} or null if unreachable.
  const key=(x,y)=>x+','+y;
  const dist={},prev={};
  dist[key(s.x,s.y)]=0;
  const todo=[{x:s.x,y:s.y}];
  while(todo.length){
    let bi=0;
    for(let i=1;i<todo.length;i++)
      if(dist[key(todo[i].x,todo[i].y)]<dist[key(todo[bi].x,todo[bi].y)])bi=i;
    const cur=todo.splice(bi,1)[0];
    for(const [dx,dy] of DIRS){
      const nx=cur.x+dx,ny=cur.y+dy;
      if(tileAt(world,nx,ny).type==='wall')continue;
      const nd=dist[key(cur.x,cur.y)]+costFn(nx,ny);
      if(!(key(nx,ny) in dist)||nd<dist[key(nx,ny)]){
        dist[key(nx,ny)]=nd;prev[key(nx,ny)]={x:cur.x,y:cur.y};
        todo.push({x:nx,y:ny});
      }
    }
  }
  if(!(key(g.x,g.y) in dist))return null;
  const route=[];let cur={x:g.x,y:g.y};
  while(cur){route.push(cur);cur=prev[key(cur.x,cur.y)];}
  route.reverse();
  return {cost:dist[key(g.x,g.y)],route};
}
function validateRoute(world,route,s,g,fname){
  if(!Array.isArray(route)||route.length<2)
    throw new Error(`${fname}(route) expects an array of at least two {x, y} points.`);
  for(const p of route)
    if(!p||!Number.isInteger(p.x)||!Number.isInteger(p.y))
      throw new Error(`${fname}: every waypoint must be an object like {x: 3, y: 5}.`);
  if(route[0].x!==s.x||route[0].y!==s.y)
    throw new Error(`${fname}: the route must begin at the start (${s.x}, ${s.y}).`);
  const last=route[route.length-1];
  if(last.x!==g.x||last.y!==g.y)
    throw new Error(`${fname}: the route must end at the goal (${g.x}, ${g.y}).`);
  for(let i=1;i<route.length;i++){
    const a=route[i-1],b=route[i];
    if(Math.abs(a.x-b.x)+Math.abs(a.y-b.y)!==1)
      throw new Error(`${fname}: waypoint ${i} (${b.x}, ${b.y}) is not adjacent to (${a.x}, ${a.y}) — one step up/down/left/right at a time.`);
    if(tileAt(world,b.x,b.y).type==='wall')
      throw new Error(`${fname}: waypoint ${i} (${b.x}, ${b.y}) is inside debris. The drone disagrees.`);
  }
}

/* reference decoder for the alien signal (chapter 18) */
function rleDecode(s){
  let out='',i=0;
  while(i<s.length){
    const c=s[i];
    if(c>='1'&&c<='9'){
      let k=i+1,depth=0;
      do{if(s[k]==='[')depth++;else if(s[k]===']')depth--;k++;}while(depth>0);
      const inner=rleDecode(s.slice(i+2,k-1));
      for(let r=0;r<Number(c);r++)out+=inner;
      i=k;
    }else{out+=c;i++;}
  }
  return out;
}

/* ============================================================
   LEVELS
   ============================================================ */
const LEVELS=[

/* ---- 1 · sequences ---- */
{
  id:'seq',title:'Wake-Up Call',concept:'Sequences',
  seeds:[1],
  brief:[
    ['HALCYON','…emergency power only… crew safe in cryo… maintenance unit B-YT3 will accept programs at any deck console…'],
    ['BYTE','Boot complete. Hello, new engineer. Fair warning: I execute exactly what you write. No more, no less, no guessing.'],
    ['YOU','Six weeks into my first engineering job, and the ship\'s AI is down. Okay. Deep breath. One instruction at a time.'],
  ],
  objective:'Walk Byte to the flashing deck console (▣) by giving it an exact sequence of commands.',
  api:[
    ['move()','Drive one tile in the direction Byte is facing.'],
    ['turnLeft() / turnRight()','Rotate 90° in place.'],
    ['report(msg)','Print a message to the output console below.'],
  ],
  starter:`// Byte starts facing east (right).
// It only does EXACTLY what you write, in order.
// Get it to the flashing console.

move();
move();
// ...keep going
`,
  build(){return worldFromRows([
    '#########',
    '#>....###',
    '#####.###',
    '#####C###',
    '#########',
  ]);},
  makeApi(sim){return movementApi(sim,{});},
  win(sim){return onType(sim,'console');},
  success:'The console flickers to life. Somewhere below deck, a relay closes.',
  card:{title:'You wrote an algorithm',body:`
    <p>An algorithm is just this: <b>a precise sequence of steps that gets a job done.</b> No intuition, no "you know what I mean" — the machine executes exactly what you wrote.</p>
    <p>Every bug you will ever fix lives in the gap between what you <em>meant</em> and what you <em>wrote</em>. You just experienced the whole discipline in miniature.</p>
    <div class="real"><div class="bt">In the wild</div>Deployment scripts, cooking-recipe-style data pipelines, spreadsheet macros — the "do these steps in order" shape is everywhere in real software.</div>`},
},

/* ---- 2 · loops ---- */
{
  id:'loop',title:'The Long Walk',concept:'Loops',
  seeds:[1],
  lineBudget:10,
  brief:[
    ['HALCYON','…stairwell to engineering… repeating structure… my fragments keep saying: do not write the same thing twice…'],
    ['BYTE','This stairwell has four identical flights. My uplink buffer only holds 10 lines of code — you cannot fit 22 commands in it.'],
    ['YOU','Four identical flights. Writing the same five commands four times feels wrong anyway.'],
  ],
  objective:'Descend the stairwell to the console. The uplink buffer holds only 10 lines — a copy-pasted solution will not fit. Wrap the repeating pattern in a loop.',
  api:[
    ['move() / turnLeft() / turnRight()','Same as before.'],
    ['for (let i = 0; i < 4; i++) { … }','JavaScript: repeat a block 4 times.'],

  build(rng){
    const world=emptyWorld(13,9);

    ['report(msg)','Print a message.'],

  starter:`// 1. Read the log into an array with push().
// 2. Then pop() entries off the end — pop gives you
//    the LAST thing pushed, i.e. the newest seal first.

let stack = [];

  stack.push(seal);
  seal = logNext();
}
// now cut them, newest first

{

  api:[
    ['commCount()','How many unread alerts are in the relay right now.'],
    ['readComm()','Take the oldest unread alert (a pod ID) out of the relay.'],
    ['wake(id)','Revive a pod. Takes one cycle. Must follow alert order.'],
    ['standby()','Wait one cycle (when no pod is ready to wake).'],
    ['allAwake()','true once all 8 pods are up.'],
    ['q.push(x) / q.shift()','Arrays again: push adds at the back, shift takes from the FRONT. That is a queue.'],
  ],
  starter:`// Every cycle: drain the relay into your queue,
// then wake the pod at the FRONT of the queue.
// push() adds at the back, shift() takes the front.

let queue = [];
while (!allAwake()) {
  while (commCount() > 0) {
    queue.push(readComm());
  }
  // wake the front of the queue — or standby()
  // if the queue is empty
}
`,
  build(rng){
    const world=emptyWorld(10,3);
    const ids=[];
    while(ids.length<8){const c='P-'+ri(rng,10,99);if(!ids.includes(c))ids.push(c);}
    const counts=[1,2,2,2,1]; // guaranteed burst: waking 1/cycle cannot keep up
    const schedule=[];let k=0;
    for(const n of counts){schedule.push(ids.slice(k,k+n));k+=n;}
    for(let x=1;x<=8;x++){const t=world.tiles[1][x];t.type='pod';t.pid=ids[x-1];}

    return world;
  },
  makeApi(sim){
    const m=sim.world.meta;
    const posOf=(id)=>m.arrivalOrder.indexOf(id)+1;
    const deliver=()=>{
      for(const id of (m.schedule[m.tick]||[])){
        m.buffer.push(id);
        sim.actions.push({t:'reveal',x:posOf(id),y:1,label:id,cls:'alert'});
        sim.actions.push({t:'note',msg:`alert: ${id} flagged  (relay ${m.buffer.length}/3)`});
        if(m.buffer.length>3)throw new Error(`RELAY OVERFLOW — a 4th alert arrived while 3 sat unread, and the order is gone. Drain the relay into your own queue every cycle. Trial failed.`);

      readComm:()=>{opTick(sim);

// 'cur' = the one being inspected.

        return m.next[id];},

      setNext:(id,nid)=>{opTick(sim);known(id,'setNext');
        if(nid!==null)known(nid,'setNext');
        m.next[id]=nid;bump(sim,'splices');
        const from=m.pos[id],to=nid===null?m.ids.length:m.pos[nid];
        for(const q of m.ids)
          if(m.pos[q]>from&&m.pos[q]<to&&m.status[q]==='corroded')

// drain the relay into 'waiting', then each cycle
// find and wake the pod with the HIGHEST critOf().

let waiting = [];
while (!allAwake()) {
  while (commCount() > 0) {
    waiting.push(readComm());
  }
  if (waiting.length === 0) {
    standby();
    continue;
  }
  // find the index of the most critical pod in
  // 'waiting', wake it, and remove it:
  //   waiting.splice(thatIndex, 1);
}
`,
  build(rng){
    const world=emptyWorld(12,3);
    const ids=[];
    while(ids.length<10){const c='P-'+ri(rng,10,99);if(!ids.includes(c))ids.push(c);}
    const cs=new Set();
    while(cs.size<10)cs.add(ri(rng,10,99));
    const crits=[...cs];
    // first two arrivals ascend in criticality, so FIFO waking
    // fails immediately — priority is not arrival order
    if(crits[0]>crits[1])[crits[0],crits[1]]=[crits[1],crits[0]];
    const crit={};ids.forEach((id,i)=>crit[id]=crits[i]);
    const counts=[2,2,2,2,2],schedule=[];let k=0;
    for(const n of counts){schedule.push(ids.slice(k,k+n));k+=n;}

      st.type='rad';st.cost=1;gt.type='rad';gt.cost=ri(rng,1,3);gt.goal=true;
      const costFn=(x,y)=>world.tiles[y][x].cost;
      const best=gridSolve(world,s,g,costFn);
      if(!best)continue;
      // cheapest cost achievable by ANY fewest-hops route, via
      // layered BFS DP — must be strictly worse than optimal, so
      // "just reuse BFS" fails on every trial
      const hop=gridSolve(world,s,g,()=>1);
      if(!hop)continue;
      const K=(x,y)=>x+','+y;
      const hd={},mc={};hd[K(s.x,s.y)]=0;mc[K(s.x,s.y)]=0;
      const q=[{x:s.x,y:s.y}];
      while(q.length){
        const c=q.shift();
        for(const [dx,dy] of DIRS){
          const nx=c.x+dx,ny=c.y+dy;
          if(tileAt(world,nx,ny).type==='wall')continue;
          if(!(K(nx,ny) in hd)){hd[K(nx,ny)]=hd[K(c.x,c.y)]+1;q.push({x:nx,y:ny});}
        }
      }
      const cells=Object.keys(hd).sort((a,b)=>hd[a]-hd[b]);
      for(const ck of cells){
        const [cx,cy]=ck.split(',').map(Number);
        for(const [dx,dy] of DIRS){
          const nx=cx+dx,ny=cy+dy,nk=K(nx,ny);
          if(!(nk in hd)||hd[nk]!==hd[ck]+1)continue;
          const nd=mc[ck]+costFn(nx,ny);
          if(!(nk in mc)||nd<mc[nk])mc[nk]=nd;
        }
      }
      if(!(K(g.x,g.y) in mc)||mc[K(g.x,g.y)]<=best.cost)continue;
      world.robot={x:s.x,y:s.y,dir:0};
      world.meta={s,g,best:best.cost,routed:false};
      return world;
    }
    throw new Error('zone generation failed');
  },
  makeApi(sim){
    const m=sim.world.meta;
    return {
      isOpen:(x,y)=>{opTick(sim);const t=tileAt(sim.world,x,y);return t.type!=='wall';},
      costOf:(x,y)=>{opTick(sim);const t=tileAt(sim.world,x,y);
        if(t.type!=='rad')throw new Error(`costOf(${x}, ${y}) — that tile is debris or outside the zone. Check isOpen first.`);
        return t.cost;},
      start:()=>{opTick(sim);return {x:m.s.x,y:m.s.y};},
      goal:()=>{opTick(sim);return {x:m.g.x,y:m.g.y};},
      plotRoute:(route)=>{opTick(sim);
        validateRoute(sim.world,route,m.s,m.g,'plotRoute');
        let total=0;
        for(let i=1;i<route.length;i++)total+=sim.world.tiles[route[i].y][route[i].x].cost;
        if(total>m.best)throw new Error(`That route absorbs ${total} rads — a ${m.best}-rad route exists. Fewest tiles is not least radiation: expand the CHEAPEST tile first, not the oldest. Trial failed.`);
        sim.counts.rads=total;
        for(let i=1;i<route.length;i++)sim.actions.push({t:'mark',x:route[i].x,y:route[i].y,cls:'ok'});
        m.routed=true;maybeWin(sim);},
    };
  },
  win(sim){return sim.world.meta.routed===true;},
  success:'The crawler reaches the mast with dosimeter to spare and the uplink blinks alive. Halfway there.',
  card:{title:'Dijkstra: when steps aren\'t equal',body:`
    <p>You changed ONE decision — take the <em>cheapest-known</em> tile instead of the <em>oldest</em> — and BFS became <b>Dijkstra's algorithm</b>, the foundation of routing on weighted graphs. Swap the queue for a priority queue; the rest of the shape survives.</p>
    <p>Your linear min-scan makes each pick O(n); a heap makes it O(log n). And if you add a "roughly how far to the goal?" hunch to the priority, Dijkstra becomes <b>A*</b> — the version games and robots use.</p>
    <div class="real"><div class="bt">In the wild</div>GPS with traffic (time as weight, not distance), internet packet routing (OSPF literally runs Dijkstra), flight-price searches, power-grid planning. Arguably the most economically valuable 30 lines of code ever written.</div>`},
},

  starter:`// Sweep the list repeatedly:
// start anything whose dependencies are ALL up,
// until everything is up. (Track what's up in an
// object — chapter 11's trick.)

const all = systemsList();
let up = {};
let started = 0;

while (started < all.length) {
  for (const s of all) {
    if (up[s]) continue;
    // is every code in dependsOn(s) already up?
    // if yes: restart(s); up[s] = true; started++;
  }
}
`,
  build(rng){
    const world=emptyWorld(11,3);
    const codes=['RCT','NAV','COM','LIF','SHD','SEN','DOK','GRV','BCN'];
    const topo=[...codes];
    for(let i=topo.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[topo[i],topo[j]]=[topo[j],topo[i]];}
    const deps={};deps[topo[0]]=[];
    for(let i=1;i<topo.length;i++){
      const n=Math.min(i,ri(rng,1,2)),pick=new Set();

    // so "just restart them in list order" fails every trial
    let display;
    do{
      display=[...codes];
      for(let i=display.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[display[i],display[j]]=[display[j],display[i]];}
    }while(display.every((s,i)=>deps[s].every(d=>display.indexOf(d)<i)));
    for(let x=1;x<=9;x++){const t=world.tiles[1][x];t.type='sys';t.pid=display[x-1];}

    <p>And your worry was correct: if a sweep ever starts nothing while systems are still down, the graph has a <em>cycle</em> — A needs B needs A — and no valid order exists at all. You'll meet that in real life as "circular dependency detected".</p>

// best[i] = cheapest total to REACH gate i.
// Each entry uses three answers you already computed.

let toll = [];
for (let i = 0; i < n; i++) toll.push(tollAt(i));

let best = [0];      // gate 0 is the free dock
let from = [null];   // which gate we came from

for (let i = 1; i < n; i++) {
  // try arriving from i-1, i-2, i-3 (when they exist):
  // pick the one with the smallest best[...],
  // record best[i] = that + toll[i], and from[i].
}

// walk from[] backwards from gate 25, reverse,
// plotJumps(...) the result.

  starter:`// Recursive descent:
// letters copy straight to the output.
// a digit announces a [block] — decode the INSIDE
// (same function, smaller string), repeat it, move on.

function decode(s) {
  let out = "";
  let i = 0;
  while (i < s.length) {
    const c = s[i];
    if (c >= "1" && c <= "9") {
      const close = matchBracket(s, i + 1);
      // decode s.slice(i + 2, close), append it
      // Number(c) times, then jump i past the block
    } else {
      out += c;
      i++;
    }
  }
  return out;
}

transmit(decode(signal()));
`,
  build(rng,ti){
    const W=['KHA','ZOR','VUT','TIK','RAA','MEL','ODA','SHU','NEB','ILO'];
    const pick=()=>W[ri(rng,0,W.length-1)];

    else if(ti===1)enc=`${ri(rng,2,3)}[${pick()} ${ri(rng,2,3)}[${pick()} ]]${pick()}`;

    const expected=rleDecode(enc);

    for(let i=0;i<enc.length;i++){
      const t=world.tiles[1+Math.floor(i/13)][1+i%13];

    }
    world.meta={enc,expected,sent:false};
    return world;
  },
  makeApi(sim){
    const m=sim.world.meta;
    return {
      signal:()=>{opTick(sim);return m.enc;},
      matchBracket:(s,i)=>{opTick(sim);

        let depth=0;
        for(let k=i;k<s.length;k++){
          if(s[k]==='[')depth++;
          if(s[k]===']'&&--depth===0)return k;
        }
        throw new Error('matchBracket: no matching "]" — is the string sliced correctly?');},
      transmit:(text)=>{opTick(sim);

          m.sent=true;
          for(let y=0;y<sim.world.h;y++)for(let x=0;x<sim.world.w;x++)
            if(sim.world.tiles[y][x].type==='record')sim.actions.push({t:'mark',x,y,cls:'ok'});
          sim.actions.push({t:'note',msg:'TRANSLATION: '+m.expected});
          maybeWin(sim);
        }else{
          let n=0;while(n<Math.max(text.length,m.expected.length)&&text[n]===m.expected[n])n++;
          throw new Error(`Transmission garbled at character ${n}: expected “…${m.expected.slice(Math.max(0,n-6),n+6)}…”, received “…${text.slice(Math.max(0,n-6),n+6)}…”. Nested blocks must be decoded by the same function that decodes the whole. Trial failed.`);}},

  },

  build(rng,ti){

{

  ],
  starter:`// Take-or-skip DP:
// best[i] = the most credits from gates 0..i.
// Either skip gate i (best[i-1]) or take it
// (best[i-2] + value[i]).

const n = gateCount();
let v = [];
for (let i = 0; i < n; i++) v.push(valueAt(i));

let best = [v[0], Math.max(v[0], v[1])];
let took = [];
for (let i = 2; i < n; i++) {
  // fill best[i]
}

// reconstruct: walk i from n-1 down —
// if best[i] === best[i-1], gate i was skipped (i--);
// otherwise it was taken (record i, i -= 2).
`,
  build(rng){
    const world=emptyWorld(12,4);
    for(let tries=0;tries<100;tries++){
      const v=[];for(let i=0;i<20;i++)v.push(ri(rng,5,40));
      const best=[v[0],Math.max(v[0],v[1])];
      for(let i=2;i<20;i++)best.push(Math.max(best[i-1],best[i-2]+v[i]));
      // make sure "every other gate" doesn't happen to be optimal
      let evens=0,odds=0;
      for(let i=0;i<20;i++)(i%2?odds+=v[i]:evens+=v[i]);
      if(Math.max(evens,odds)>=best[19])continue;
      for(let i=0;i<20;i++){
        const t=world.tiles[1+Math.floor(i/10)][1+i%10];
        t.type='rad';t.cost=Math.min(9,Math.ceil(v[i]/5));t.idx=i;t.val=v[i];
      }
      world.meta={v,opt:best[19],sold:false};
      return world;
    }
    throw new Error('gate generation failed');

  makeApi(sim){

    return {
      gateCount:()=>{opTick(sim);return 20;},
      valueAt:(i)=>{opTick(sim);checkIndex(i,20,'valueAt');return m.v[i];},

   SOUND — tiny WebAudio bleep engine, no assets
   ============================================================ */
let audioCtx=null;
let soundOn=localStorage.getItem('cs_sound')!=='0';
function blip(freq,dur=0.06,type='square',gain=0.03,when=0){
  if(!soundOn||CS.instant)return;
  try{
    audioCtx??=new (window.AudioContext||window.webkitAudioContext)();
    const t=audioCtx.currentTime+when;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(gain,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(t);o.stop(t+dur+0.02);
  }catch(e){/* audio unavailable — play on in silence */}
}

function genBinarySearchFrames(){
  const arr=[3,7,12,19,26,31,38,44,52,60,67,75];
  const target=44;
  let lo=0,hi=arr.length-1;
  const frames=[];
  const snap=(extra,caption)=>({rows:[{label:'array',cells:arr.map((v,i)=>{
    const tags=[];
    if(extra&&extra.mid===i)tags.push('mid');
    if(lo<=hi&&i===lo)tags.push('lo');
    if(lo<=hi&&i===hi)tags.push('hi');
    return {text:String(v),sub:String(i),tags,
      cls: extra&&extra.found===i?'good':(i<lo||i>hi)?'dim':(extra&&extra.mid===i)?'active':''};
  })}],caption});
  frames.push(snap(null,`Searching for ${target} in a SORTED array of ${arr.length}. lo=0, hi=${arr.length-1}.`));
  let step=0;
  while(lo<=hi){
    step++;
    const mid=Math.floor((lo+hi)/2),midVal=arr[mid];
    if(midVal===target){
      frames.push(snap({mid,found:mid},`mid = ${mid}, value ${midVal} — MATCH. Found in ${step} check${step>1?'s':''} instead of up to ${arr.length}.`));
      break;
    }else if(midVal<target){
      frames.push(snap({mid},`mid = ${mid}, value ${midVal} < ${target}. Target must be to the right — discard everything from lo through mid.`));
      lo=mid+1;
    }else{
      frames.push(snap({mid},`mid = ${mid}, value ${midVal} > ${target}. Target must be to the left — discard everything from mid through hi.`));
      hi=mid-1;
    }
    if(lo<=hi)frames.push(snap(null,`New range: lo=${lo}, hi=${hi} — half the remaining array just disappeared.`));
  }
  return frames;
}

    stack.pop();

    for(let i=1;i<waiting.length;i++)if(waiting[i][1]>waiting[bi][1])bi=i;
    frames.push({rows:[{label:'waiting',cells:waiting.map(([id,c],i)=>({text:`${id}:${c}`,cls:i===bi?'picked':''}))}],
      caption:`Scan all waiting pods: ${waiting[bi][0]} is the highest criticality (${waiting[bi][1]}) — wake it next.`});
    waiting=waiting.filter((_,i)=>i!==bi);
  }
  frames.push({rows:[{label:'waiting',cells:[{text:'empty',cls:'dim'}]}],
    caption:'All woken, most-critical-first — a full re-scan every round is the cost of not using a heap.'});

}
function genTopoFrames(){
  const systems=['RCT','NAV','COM','LIF'];
  const deps={RCT:[],NAV:['RCT'],COM:['NAV'],LIF:['RCT','NAV']};
  const up=new Set(),order=[];
  const snap=(caption,readyId)=>({rows:[
    {label:'systems',cells:systems.map(s=>({text:s,cls:up.has(s)?'good':s===readyId?'active':'',
      sub:deps[s].length?'needs '+deps[s].join(','):'no deps'}))},
    {label:'started',cells:order.length?order.map(s=>({text:s,cls:'good'})):[{text:'—',cls:'dim'}]},
  ],caption});
  const frames=[snap('Arrows mean "needs". A system can only start once everything it needs is already up.')];
  while(up.size<systems.length){
    let progressed=false;
    for(const s of systems){
      if(up.has(s))continue;
      if(deps[s].every(d=>up.has(d))){
        frames.push(snap(`${s} needs [${deps[s].join(', ')||'nothing'}] — all satisfied. Start it.`,s));
        up.add(s);order.push(s);progressed=true;
      }
    }
    if(!progressed)break;
  }
  frames.push(snap('Every system started, in an order that never violated a dependency — this repeated sweep is Kahn\'s algorithm.'));
  return frames;
}
function genDPFrames(){
  const toll=[0,4,8,2,9,3,6,1,5,7,4];
  const n=toll.length;
  const best=[0];
  const snap=(i,cands,caption)=>({rows:[
    {label:'toll',cells:toll.map((v,k)=>({text:String(v),sub:String(k),
      cls:k===i?'active':(cands&&cands.includes(k))?'picked':''}))},
    {label:'best[]',cells:best.map((v,k)=>({text:String(v),sub:String(k),cls:'good'}))
      .concat(Array.from({length:n-best.length},(_,j)=>({text:'?',sub:String(best.length+j),cls:'dim'})))},
  ],caption});
  const frames=[snap(0,null,'best[0] = 0 — the dock is free. Every later best[i] is built from up to three EARLIER answers.')];
  for(let i=1;i<n;i++){
    const cands=[];
    for(let k=1;k<=3;k++)if(i-k>=0)cands.push(i-k);
    frames.push(snap(i,cands,`Gate ${i}: look back at best[${cands.join('], best[')}] — jumps of 1, 2, or 3 gates land here.`));
    let b=Infinity;
    for(const k of cands)if(best[k]+toll[i]<b)b=best[k]+toll[i];
    best.push(b);
    frames.push(snap(i,cands,`best[${i}] = toll[${i}] (${toll[i]}) + the cheapest of those = ${b}. Never recomputed again.`));
  }
  frames.push(snap(n-1,null,`best[${n-1}] = ${best[n-1]} — the minimum total toll, computed once per gate instead of exponentially many times.`));
  return frames;
}
function genParseFrames(){
  const enc='2[AB3[C]]D';
  const frames=[{rows:[{label:'signal',cells:[...enc].map((ch,j)=>({text:ch,sub:String(j)}))}],
    caption:`Encoded signal: "${enc}". A digit means "repeat the following [block]". Blocks can nest.`}];
  function decode(s,depth){
    let out='',i=0;
    while(i<s.length){
      const c=s[i];
      if(c>='1'&&c<='9'){
        let k=i+1,d=0;
        do{if(s[k]==='[')d++;else if(s[k]===']')d--;k++;}while(d>0);
        const inner=s.slice(i+2,k-1);
        frames.push({rows:[{label:'reading',cells:[...s].map((ch,j)=>({text:ch,sub:String(j),
          cls:j>=i&&j<k?'active':j<i?'good':''}))}],
          caption:`Digit "${c}" at depth ${depth}: repeat the block "${inner}" ${c} time${c>'1'?'s':''}. Decode the INSIDE first — same function, smaller string.`});
        const decoded=decode(inner,depth+1);
        for(let r=0;r<Number(c);r++)out+=decoded;
        i=k;
      }else{out+=c;i++;}
    }
    return out;
  }
  const result=decode(enc,0);
  frames.push({rows:[{label:'decoded',cells:[...result].map(ch=>({text:ch,cls:'good'}))}],
    caption:`Fully decoded: "${result}". Nested blocks needed a decoder that calls itself.`});
  return frames;
}

/* ---------- frame generators: grid demos ---------- */
function genMazeFrames(){
  const lvl=LEVELS.find(l=>l.id==='maze');
  const world=lvl.build(mulberry32(29),0);
  const r={x:world.robot.x,y:world.robot.y,dir:world.robot.dir};
  const startPos={x:r.x,y:r.y};
  const trail=new Set([r.x+','+r.y]);
  const snap=(caption)=>({grid:world.tiles.map((row,y)=>row.map((t,x)=>{
    let cls=t.type==='wall'?'wall':'';
    if(t.type==='airlock')cls+=' goal';
    if(x===startPos.x&&y===startPos.y)cls+=' start';
    if(x===r.x&&y===r.y)cls+=' current';
    else if(trail.has(x+','+y)&&t.type!=='wall')cls+=' path';
    return {cls:cls.trim(),text:''};
  })),caption});
  const frames=[snap('Byte has no map — only local sensors: ahead, left, right. Right-hand rule: keep the wall on the right hand and never let go.')];
  const ahead=(turn)=>{const d=(r.dir+turn+4)%4;return {x:r.x+DIRS[d][0],y:r.y+DIRS[d][1]};};
  const openAt=(p)=>tileAt(world,p.x,p.y).type!=='wall';
  let guard=0;
  while(tileAt(world,r.x,r.y).type!=='airlock'&&guard++<250){
    const right=ahead(1),fwd=ahead(0);
    let caption;
    if(openAt(right)){r.dir=(r.dir+1)%4;caption='Right side is open — turn right, then step.';}
    else if(openAt(fwd)){caption='Right is blocked, ahead is open — step forward.';}
    else{r.dir=(r.dir+3)%4;frames.push(snap('Boxed in on this side — turn left and re-check.'));continue;}
    const p=ahead(0);r.x=p.x;r.y=p.y;trail.add(r.x+','+r.y);
    frames.push(snap(caption));
  }
  frames.push(snap('Airlock reached. The right-hand rule explores every corridor of a simply-connected maze — using only local sensing and zero memory of the map.'));
  return frames;
}
function genBfsFrames(){
  const lvl=LEVELS.find(l=>l.id==='bfs');
  const world=lvl.build(mulberry32(19),0);
  const s=world.meta.s,g=world.meta.g;
  const key=(x,y)=>x+','+y;
  const dist={};dist[key(s.x,s.y)]=0;
  const cameFrom={};
  let frontier=[s];
  const snap=(caption,path)=>({grid:world.tiles.map((row,y)=>row.map((t,x)=>{
    let cls=t.type==='wall'?'wall':'';
    if(key(x,y) in dist)cls+=' visited';
    if(frontier.some(p=>p.x===x&&p.y===y))cls+=' frontier';
    if(x===s.x&&y===s.y)cls+=' start';
    if(x===g.x&&y===g.y)cls+=' goal';
    if(path&&path.some(p=>p.x===x&&p.y===y))cls+=' path';
    return {cls:cls.trim(),text:''};
  })),caption});
  const frames=[snap('BFS explores in RIPPLES: everything 1 step away, then 2, then 3 — using a queue.')];
  let ring=0,guard=0;
  while(frontier.length&&!(key(g.x,g.y) in dist)&&guard++<40){
    ring++;
    const next=[];
    for(const c of frontier)for(const [dx,dy] of DIRS){
      const nx=c.x+dx,ny=c.y+dy,k=key(nx,ny);
      if(tileAt(world,nx,ny).type==='wall'||k in dist)continue;
      dist[k]=ring;cameFrom[k]=c;next.push({x:nx,y:ny});
    }
    frontier=next;
    frames.push(snap(`Ring ${ring}: every tile exactly ${ring} step${ring>1?'s':''} from the start lights up at once.`));
  }
  let cur={x:g.x,y:g.y};const path=[cur];
  while(!(cur.x===s.x&&cur.y===s.y)){cur=cameFrom[key(cur.x,cur.y)];path.push(cur);}
  frontier=[];
  frames.push(snap('Goal reached first via the ripple that got there earliest — walking cameFrom backwards recovers the shortest path.',path));
  return frames;
}
function genDijkstraFrames(){
  const costs=[[1,1,1,9,1],[1,9,1,9,1],[1,9,1,9,1],[1,9,1,1,1],[1,1,1,9,1]];
  const w=5,h=5,s={x:0,y:0},g={x:4,y:0};
  const key=(x,y)=>x+','+y;
  const dist={};dist[key(s.x,s.y)]=0;
  const cameFrom={};
  let todo=[s];
  const inb=(x,y)=>x>=0&&y>=0&&x<w&&y<h;
  const snap=(caption,cur,path)=>({grid:Array.from({length:h},(_,y)=>Array.from({length:w},(_,x)=>{
    let cls='';
    const k=key(x,y);
    if(k in dist)cls+=' visited';
    if(todo.some(p=>p.x===x&&p.y===y))cls+=' frontier';
    if(cur&&cur.x===x&&cur.y===y)cls+=' current';
    if(x===s.x&&y===s.y)cls+=' start';
    if(x===g.x&&y===g.y)cls+=' goal';
    if(path&&path.some(p=>p.x===x&&p.y===y))cls+=' path';
    return {cls:cls.trim(),text:String(costs[y][x])};
  })),caption});
  const frames=[snap('Every tile costs 1–9 to enter (shown). BFS would treat them all equally; Dijkstra always expands the CHEAPEST known tile next.')];
  let guard=0;
  while(todo.length&&guard++<60){
    let bi=0;
    for(let i=1;i<todo.length;i++)if(dist[key(todo[i].x,todo[i].y)]<dist[key(todo[bi].x,todo[bi].y)])bi=i;
    const cur=todo.splice(bi,1)[0];
    if(cur.x===g.x&&cur.y===g.y){frames.push(snap(`Goal reached — total cost ${dist[key(cur.x,cur.y)]}.`,cur));break;}
    frames.push(snap(`Expand (${cur.x},${cur.y}) — cheapest unexplored tile, cost ${dist[key(cur.x,cur.y)]} so far.`,cur));
    for(const [dx,dy] of DIRS){
      const nx=cur.x+dx,ny=cur.y+dy;
      if(!inb(nx,ny))continue;
      const k=key(nx,ny),nd=dist[key(cur.x,cur.y)]+costs[ny][nx];
      if(!(k in dist)||nd<dist[k]){dist[k]=nd;cameFrom[k]=cur;todo.push({x:nx,y:ny});}
    }
  }
  let cur={x:g.x,y:g.y};const path=[cur];
  while(!(cur.x===s.x&&cur.y===s.y)){cur=cameFrom[key(cur.x,cur.y)];path.push(cur);}
  const straight=costs[0][1]+costs[0][2]+costs[0][3]+costs[0][4];
  todo=[];
  frames.push(snap(`Cheapest total: ${dist[key(g.x,g.y)]} (the straight top row would cost ${straight} — worse, since it crosses an expensive 9). Fewest tiles is not the goal here; least total cost is.`,null,path));
  return frames;
}
function genRecursionFrames(){
  const n=4,beacon={x:3,y:1};
  const inRect=(x,y,r)=>x>=r.x1&&x<=r.x2&&y>=r.y1&&y<=r.y2;
  const snap=(rect,caption)=>({grid:Array.from({length:n},(_,y)=>Array.from({length:n},(_,x)=>{
    let cls=rect&&inRect(x,y,rect)?'frontier':'dim';
    if(x===beacon.x&&y===beacon.y)cls+=' goal';
    return {cls:cls.trim(),text:x===beacon.x&&y===beacon.y?'◆':''};
  })),caption});
  const frames=[snap(null,'The same idea as binary search, in two dimensions: ask "is it in THIS quarter?" and recurse into the one that says yes.')];
  function search(rect){
    if(rect.x1===rect.x2&&rect.y1===rect.y2){
      frames.push(snap(rect,'1×1 — this must be the beacon\'s cell. Base case: dig here.'));
      return;
    }
    const mx=Math.floor((rect.x1+rect.x2)/2),my=Math.floor((rect.y1+rect.y2)/2);
    const quads=[
      {x1:rect.x1,y1:rect.y1,x2:mx,y2:my},{x1:mx+1,y1:rect.y1,x2:rect.x2,y2:my},
      {x1:rect.x1,y1:my+1,x2:mx,y2:rect.y2},{x1:mx+1,y1:my+1,x2:rect.x2,y2:rect.y2},
    ];
    frames.push(snap(rect,'Quarter the square and probe each of the 4 quadrants.'));
    for(const q of quads){
      const hit=inRect(beacon.x,beacon.y,q);
      frames.push(snap(q,`probe(${q.x1},${q.y1},${q.x2},${q.y2}) → ${hit?'YES — it\'s in here':'no'}.`));
      if(hit){search(q);return;}
    }
  }
  search({x1:0,y1:0,x2:n-1,y2:n-1});
  return frames;
}

      'Dijkstra\'s algorithm solves shortest paths when edges have different weights. Swap BFS\'s plain queue for a priority queue that always pops the cheapest-known-so-far option, and the same ripple structure now correctly handles unequal costs.',
      'This one change matters: with weights, fewest STEPS is no longer the same as least total COST — a short path through expensive terrain can lose to a longer path through cheap terrain.',
      'Add a "roughly how far is the goal?" estimate to the priority, and Dijkstra becomes A* — the algorithm most games and robots actually use for pathfinding.'],
    complexity:[{label:'Time',val:'O((V+E) log V)'},{label:'Handles negative weights?',val:'No'}],
    pseudocode:'dist = {start: 0}\ntodo = [start]\nwhile todo not empty:\n  cur = item in todo with smallest dist\n  for each neighbor of cur:\n    newDist = dist[cur] + cost(cur, neighbor)\n    if newDist beats dist[neighbor]: update it, add neighbor to todo'},
  topo:{title:'Topological Sort',demoType:'cells',frames:genTopoFrames,
    oneLiner:'When some things must happen before others, repeatedly start whatever has no unmet dependencies left.',
    explanation:[
      'A topological sort orders the nodes of a dependency graph (arrows meaning "needs") so every arrow points from earlier to later in the final order. It only exists for graphs with NO cycles.',
      'Kahn\'s algorithm computes it with repeated sweeps: find every node whose dependencies are all satisfied, process them, and repeat. If a sweep ever finds nothing to process while nodes remain, the graph has a cycle and no valid order exists.',
      'This shows up everywhere outside of graphs specifically: build systems deciding compile order, package managers resolving installs, spreadsheets recalculating formulas.'],
    complexity:[{label:'Time',val:'O(V + E)'},{label:'Requires',val:'No cycles (a DAG)'}],
    pseudocode:'while any node remains unstarted:\n  for each unstarted node n:\n    if every dependency of n has started: start n'},
  quad:{title:'Recursion & Divide-and-Conquer',demoType:'grid',frames:genRecursionFrames,
    oneLiner:'Solve a big problem by handing smaller copies of the same problem to yourself, down to a base case simple enough to answer directly.',
    explanation:[
      'A recursive function calls itself on a SMALLER version of the same problem, plus a base case that can be answered directly without recursing further. Every unfinished call waits on the call stack while its smaller self runs — recursion depends on the stack.',
      'Divide-and-conquer is a specific recursive pattern: split the problem into pieces, solve each piece recursively, then combine the results. Binary search is divide-and-conquer in one dimension; this quadrant search is the same idea in two.',
      'Recursion is a tool, not magic — anything recursive can also be written with an explicit loop and a manual stack. It\'s usually chosen because it mirrors the problem\'s own structure.'],
    complexity:[{label:'This search',val:'O(log(area))'},{label:'Needs',val:'A base case + shrinking input'}],
    pseudocode:'function search(region):\n  if region is 1 cell: return region\n  split region into 4 quadrants\n  probe each; recurse into the one containing the target'},
  dp:{title:'Dynamic Programming',demoType:'cells',frames:genDPFrames,
    oneLiner:'Answer every sub-question exactly once, and build bigger answers out of the small answers you already have stored.',
    explanation:[
      'Plain recursion can re-solve the exact same sub-problem many times over — for "cheapest way to reach gate i"-style problems, that duplication grows exponentially. Dynamic programming stores each sub-answer the first time it\'s computed and reuses it forever after.',
      'The "bottom-up" style fills a table in order, as shown here: each entry is built from a few earlier entries. The equivalent "top-down" style keeps the natural recursion but adds a cache (memoization) so no sub-problem is solved twice.',
      'Either way, the effect is the same: an exponential brute force collapses into something polynomial — usually linear or close to it.'],
    complexity:[{label:'This example',val:'O(n) time, O(n) space'},{label:'Naive recursion',val:'Exponential'}],
    pseudocode:'best[0] = 0\nfor i in 1..n:\n  best[i] = min(best[i-1], best[i-2], best[i-3]) + cost[i]'},
  parse:{title:'Parsing (Recursive Descent)',demoType:'cells',frames:genParseFrames,
    oneLiner:'When the input\'s structure can nest inside itself, the code that reads it has to be able to call itself too.',
    explanation:[
      'Recursive descent parsing reads text left to right, and whenever it meets something that can contain a nested structure, it calls the SAME reading function on the inner piece before continuing.',
      'Flat tools like plain find-and-replace, or many regular expressions, can\'t handle arbitrary nesting because they have no way to track "how deep am I right now" — that bookkeeping is exactly what the call stack gives recursion for free.',
      'This is the same technique, at a larger scale, that reads JSON, compiles programming languages, and renders nested markup.'],
    complexity:[{label:'Time',val:'O(n) in input length'},{label:'Handles nesting?',val:'Yes, natively'}],
    pseudocode:'function decode(s):\n  if s starts with a digit:\n    decode the bracketed block that follows (recurse)\n    repeat it that many times\n  else: copy the character through'},
};

function renderCellsFrame(container,frame){
  container.innerHTML='';
  for(const row of frame.rows){
    const rowEl=document.createElement('div');rowEl.className='viz-row';
    if(row.label){const lbl=document.createElement('div');lbl.className='viz-rowlabel';lbl.textContent=row.label;rowEl.appendChild(lbl);}
    for(const c of row.cells){
      if(c.arrow){const a=document.createElement('div');a.className='viz-arrow';a.textContent='→';rowEl.appendChild(a);continue;}
      const cell=document.createElement('div');cell.className='vcell'+(c.cls?' '+c.cls:'');
      const tags=document.createElement('div');tags.className='vtags';tags.textContent=(c.tags&&c.tags.length)?c.tags.join(','):'';

      const sub=document.createElement('div');sub.className='vsub';sub.textContent=c.sub||'';cell.appendChild(sub);

  }
}

class VizPlayer{
  constructor(host,type,frames){
    this.type=type;this.frames=frames;this.i=0;this.playing=false;this.timer=null;
    host.innerHTML=`<div class="viz">
      <div class="viz-content"></div>
      <div class="viz-caption"></div>
      <div class="viz-controls">
        <button class="vbtn" data-a="reset" title="Restart">⏮</button>
        <button class="vbtn" data-a="prev" title="Previous step">◂</button>
        <button class="vbtn" data-a="play" title="Play/pause">▶ Play</button>
        <button class="vbtn" data-a="next" title="Next step">▸</button>
        <span class="viz-frame"></span>
      </div></div>`;
    this.content=host.querySelector('.viz-content');
    this.caption=host.querySelector('.viz-caption');
    this.frameLbl=host.querySelector('.viz-frame');
    this.playBtn=host.querySelector('[data-a="play"]');
    host.querySelector('[data-a="reset"]').addEventListener('click',()=>this.goto(0));
    host.querySelector('[data-a="prev"]').addEventListener('click',()=>{this.stop();this.goto(this.i-1);});
    host.querySelector('[data-a="next"]').addEventListener('click',()=>{this.stop();this.goto(this.i+1);});
    this.playBtn.addEventListener('click',()=>this.togglePlay());
    this.render();
  }
  goto(i){this.i=Math.max(0,Math.min(this.frames.length-1,i));this.render();}
  render(){
    const f=this.frames[this.i];
    if(this.type==='grid')renderGridFrame(this.content,f);else renderCellsFrame(this.content,f);
    this.caption.textContent=f.caption||'';
    this.frameLbl.textContent=`Step ${this.i+1} / ${this.frames.length}`;
  }
  togglePlay(){
    if(this.playing){this.stop();return;}
    this.playing=true;this.playBtn.textContent='⏸ Pause';
    const step=()=>{
      if(this.i>=this.frames.length-1){this.stop();return;}
      this.goto(this.i+1);
      this.timer=setTimeout(step,1100);
    };
    this.timer=setTimeout(step,1100);
  }
  stop(){this.playing=false;if(this.playBtn)this.playBtn.textContent='▶ Play';if(this.timer)clearTimeout(this.timer);this.timer=null;}
}

/* ---------- error locations ---------- */
/* new Function() compiles as: line1 "function anonymous(args" /
   line2 ") {" / line3 '"use strict";' / line4 = user line 1.
   The guard injector never adds newlines, so lines are preserved.
   (stackLine/curUserLine, which do the actual -3 correction, live
   next to opTick in the interpreter section above.) */
function errLine(e,lineCount){
  const ln=stackLine(e&&e.stack);
  return (ln!==null&&ln<=lineCount)?ln:null;
}
function describeError(e,code){
  let msg=e.message||String(e);
  const lines=code.split('\n');
  const ln=errLine(e,lines.length);
  if(ln){
    let snip=lines[ln-1].trim();
    if(snip.length>52)snip=snip.slice(0,52)+'…';
    msg+=`   [line ${ln}: ${snip}]`;
  }
  return msg;
}
/* string/comment-aware bracket balance report for syntax errors */
function bracketReport(src){
  const open=[],pairs={')':'(',']':'[','}':'{'};
  let line=1,i=0;
  while(i<src.length){
    const c=src[i];
    if(c==='\n'){line++;i++;continue;}
    if(c==='"'||c==="'"||c==='`'){const q=c;i++;
      while(i<src.length){if(src[i]==='\\'){i+=2;continue;}if(src[i]==='\n')line++;if(src[i]===q){i++;break;}i++;}continue;}
    if(c==='/'&&src[i+1]==='/'){while(i<src.length&&src[i]!=='\n')i++;continue;}
    if(c==='/'&&src[i+1]==='*'){while(i<src.length&&!(src[i]==='*'&&src[i+1]==='/')){if(src[i]==='\n')line++;i++;}i+=2;continue;}
    if(c==='('||c==='['||c==='{')open.push([c,line]);
    else if(c in pairs){
      if(!open.length||open[open.length-1][0]!==pairs[c])return `Stray “${c}” on line ${line} with no matching “${pairs[c]}”.`;
      open.pop();
    }
    i++;
  }
  if(open.length){const [ch,ln]=open[open.length-1];return `“${ch}” opened on line ${ln} is never closed.`;}
  return null;
}

function tileClasses(t){

  if(t.fixed)c+=' fixed';

/* ---------- action replay ---------- */
async function applyAction(a){
  switch(a.t){
    case 'move':viewWorld.robot.x=a.x;viewWorld.robot.y=a.y;updateRobot();SFX.move();await sleep(delay(130));break;
    case 'turn':viewWorld.robot.dir=a.dir;updateRobot();SFX.turn();await sleep(delay(110));break;
    case 'bump':robotEl.classList.add('bump');cline('· clunk — that\'s a wall.','c-warn');SFX.bump();
      await sleep(delay(200));robotEl.classList.remove('bump');break;
    case 'ping':{const el=tileEls[a.y]?.[a.x];if(el){el.classList.add('ping');SFX.ping();await sleep(delay(90));el.classList.remove('ping');}break;}
    case 'pingRect':{const els=[];
      for(let y=a.y1;y<=a.y2;y++)for(let x=a.x1;x<=a.x2;x++){const el=tileEls[y]?.[x];if(el){el.classList.add('ping');els.push(el);}}
      SFX.ping();await sleep(delay(320));
      for(const el of els)el.classList.remove('ping');
      await sleep(delay(80));break;}
    case 'reveal':{const t=viewWorld.tiles[a.y][a.x];t.revealed=true;t.label=a.label;if(a.cls)t.revealCls=a.cls;
      renderTile(a.x,a.y);SFX.reveal();await sleep(delay(220));break;}
    case 'fix':{const t=viewWorld.tiles[a.y][a.x];t.fixed=true;renderTile(a.x,a.y);
      cline('» replacement cell seated. voltage nominal.','c-ok');SFX.ok();await sleep(delay(300));break;}
    case 'open':{const t=viewWorld.tiles[a.y][a.x];t.opened=a.ok?'ok':'bad';renderTile(a.x,a.y);
      (a.ok?SFX.ok:SFX.bad)();await sleep(delay(300));break;}
    case 'swap':{const A=viewWorld.tiles[1][a.i+1],B=viewWorld.tiles[1][a.j+1];
      [A.weight,B.weight]=[B.weight,A.weight];
      [A.label,B.label]=[B.label,A.label];
      [A.revealed,B.revealed]=[B.revealed,A.revealed];
      renderTile(a.i+1,1);renderTile(a.j+1,1);await sleep(delay(240));break;}
    case 'report':cline('» '+a.msg,'c-report');await sleep(delay(60));break;
    case 'note':cline('· '+a.msg,'c-info');await sleep(delay(90));break;
    case 'mark':{const t=viewWorld.tiles[a.y][a.x];t.mark=a.cls;renderTile(a.x,a.y);
      if(a.cls==='ok')SFX.mark();if(a.cls==='bad')SFX.bad();await sleep(delay(220));break;}
    case 'win':if(viewWorld.robot){robotEl.classList.add('win');}
      SFX.win();
      for(let y=0;y<viewWorld.h;y++)for(let x=0;x<viewWorld.w;x++){

      }
      await sleep(delay(350));break;
  }
}

/* ---------- run flow ---------- */
function countCodeLines(code){
  return code.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('//')).length;
}
function statsOf(sim){
  const parts=[];
  for(const[k,v]of Object.entries(sim.counts))parts.push(`${k}: ${v}`);
  return parts.join(', ');
}
async function runProgram(){
  if(running)return false;
  running=true;$('#runBtn').disabled=true;
  try{
    cclear();
    const level=activeLevel(),code=editor.value;
    localStorage.setItem('cs_code_'+level.id,code);
    if(level.lineBudget){
      const n=countCodeLines(code);
      if(n>level.lineBudget){
        cline(`✗ Uplink buffer overflow: your program is ${n} lines; the buffer holds ${level.lineBudget}.`,'c-err');
        cline('  Byte: "The stairwell repeats itself. Perhaps your code should too — with a loop."','c-warn');
        return false;
      }
    }
    const sims=level.seeds.map((s,i)=>runTrial(level,s,code,i));
    if(sims[0].compileError){cline('✗ '+sims[0].failed,'c-err');return false;}
    const failIdx=sims.findIndex(s=>!s.won);
    const showIdx=failIdx===-1?0:failIdx;
    cline(`▶ Uploading program… running ${sims.length} trial${sims.length>1?'s':''}. Replaying trial ${showIdx+1}.`);
    await replayTrial(level,level.seeds[showIdx],sims[showIdx].actions,showIdx);
    sims.forEach((s,i)=>{
      if(s.won)cline(`✓ Trial ${i+1}: objective complete${statsOf(s)?'  ('+statsOf(s)+')':''}`,'c-ok');
      else cline(`✗ Trial ${i+1}: ${s.failed||'program ended before the objective was met.'}`,'c-err');
    });
    if(failIdx===-1){
      const kind=level.side?'SIDE MISSION':level.primer?'LESSON':'CHAPTER';
      cline('',''); cline(`✓ ${kind} COMPLETE — `+level.success,'c-ok');
      failCounts[level.id]=0;
      if(level.side){
        localStorage.setItem('cs_side_'+level.id,'1');
        renderSideButton();
      }else if(level.primer){
        const done=+(localStorage.getItem('cs_primer_done')||0);
        if(level.idx>=done)localStorage.setItem('cs_primer_done',String(level.idx+1));
      }else if(cur>=unlocked){
        unlocked=cur+1;localStorage.setItem('cs_unlocked',unlocked);
        renderSideButton();
      }
      renderChips();
      if(!CS.instant){await sleep(700);showCard(level);}
      return true;
    }
    SFX.bad();
    const fails=failCounts[level.id]=(failCounts[level.id]||0)+1;
    const hints=HINTS[level.id];
    if(hints&&(fails===2||fails===4)){
      cline('','');
      cline('◈ HALCYON — recovered fragment: '+(fails===2?hints[0]:hints[1]),'c-warn');
    }
    return false;
  }finally{running=false;$('#runBtn').disabled=false;}
}
