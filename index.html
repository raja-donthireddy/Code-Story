  bfs:{title:'Breadth-First Search',
    examples:[{label:'Shortest path found',demoType:'grid',frames:genBfsFrames},{label:'Goal unreachable',demoType:'grid',frames:genBfsFrames2},{label:'Multi-source BFS',demoType:'grid',frames:genBfsFrames3}],
    oneLiner:'Explore a graph in ripples — everything 1 step away, then 2, then 3 — using a queue. The first time you reach something is the shortest way there.',
    explanation:[
      'BFS explores a graph outward from a start point one "ring" at a time, using a queue to track what to visit next. Because it expands in rings, the very first time it reaches any node is guaranteed to be via the shortest path, measured in steps.',
      'A visited-set (often a hash map) prevents revisiting the same node twice — without it, BFS can loop forever on a graph with cycles.',
      'It visits every node and edge at most once, so its cost is O(V + E) — proportional to the whole graph\'s size, which is why it scales even to graphs with billions of edges.'],
    mistakes:['Forgetting the visited-set — without it, BFS can revisit the same node forever on a graph with cycles.','Assuming a path always exists — a correct BFS must handle "unreachable" gracefully, not loop or crash.','Using BFS on a WEIGHTED graph, where it only guarantees fewest edges, not lowest total cost.'],
    complexity:[{label:'Time',val:'O(V + E)'},{label:'Finds shortest path?',val:'Yes (unweighted)'}],
    pseudocode:'queue = [start]\nseen = {start}\nwhile queue not empty:\n  cur = queue.shift()\n  for each neighbor of cur not in seen:\n    seen.add(neighbor); queue.push(neighbor)'},
  dijkstra:{title:'Dijkstra\'s Algorithm',
    examples:[{label:'Cheapest route found',demoType:'grid',frames:genDijkstraFrames},{label:'A negative edge breaks it',demoType:'cells',frames:genDijkstraFrames2},{label:'Uniform weights = BFS',demoType:'grid',frames:genDijkstraFrames3}],
    oneLiner:'Same ripple idea as BFS, but always expand the CHEAPEST known option next — for when steps don\'t cost the same.',
    explanation:[
      'Dijkstra\'s algorithm solves shortest paths when edges have different weights. Swap BFS\'s plain queue for a priority queue that always pops the cheapest-known-so-far option, and the same ripple structure now correctly handles unequal costs.',
      'This one change matters: with weights, fewest STEPS is no longer the same as least total COST — a short path through expensive terrain can lose to a longer path through cheap terrain.',
      'Add a "roughly how far is the goal?" estimate to the priority, and Dijkstra becomes A* — the algorithm most games and robots actually use for pathfinding.'],
    mistakes:['Running it on a graph with negative weights — the core assumption breaks and it can report a wrong answer with no warning.','Forgetting to skip a node that\'s already finalized if it resurfaces in the frontier.','Reaching for Dijkstra when plain BFS (unweighted) would already be correct and simpler.'],
    complexity:[{label:'Time',val:'O((V+E) log V)'},{label:'Handles negative weights?',val:'No'}],
    pseudocode:'dist = {start: 0}\ntodo = [start]\nwhile todo not empty:\n  cur = item in todo with smallest dist\n  for each neighbor of cur:\n    newDist = dist[cur] + cost(cur, neighbor)\n    if newDist beats dist[neighbor]: update it, add neighbor to todo'},
  topo:{title:'Topological Sort',
    examples:[{label:'A valid order',demoType:'cells',frames:genTopoFrames},{label:'A cycle: no valid order',demoType:'cells',frames:genTopoFrames2}],
    oneLiner:'When some things must happen before others, repeatedly start whatever has no unmet dependencies left.',
    explanation:[
      'A topological sort orders the nodes of a dependency graph (arrows meaning "needs") so every arrow points from earlier to later in the final order. It only exists for graphs with NO cycles.',
      'Kahn\'s algorithm computes it with repeated sweeps: find every node whose dependencies are all satisfied, process them, and repeat. If a sweep ever finds nothing to process while nodes remain, the graph has a cycle and no valid order exists.',
      'This shows up everywhere outside of graphs specifically: build systems deciding compile order, package managers resolving installs, spreadsheets recalculating formulas.'],
    mistakes:['Assuming a valid order always exists — a graph with a cycle has none, and the algorithm must detect that rather than loop forever.','Treating topological order as unique — any order that respects the arrows is valid; independent nodes can go in any relative order.'],
    complexity:[{label:'Time',val:'O(V + E)'},{label:'Requires',val:'No cycles (a DAG)'}],
    pseudocode:'while any node remains unstarted:\n  for each unstarted node n:\n    if every dependency of n has started: start n'},
  quad:{title:'Recursion & Divide-and-Conquer',
    examples:[{label:'Quartering to the beacon',demoType:'grid',frames:genRecursionFrames},{label:'A missing base case',demoType:'grid',frames:genRecursionFrames2},{label:'Fast exponentiation',demoType:'cells',frames:genRecursionFrames3}],
    oneLiner:'Solve a big problem by handing smaller copies of the same problem to yourself, down to a base case simple enough to answer directly.',
    explanation:[
      'A recursive function calls itself on a SMALLER version of the same problem, plus a base case that can be answered directly without recursing further. Every unfinished call waits on the call stack while its smaller self runs — recursion depends on the stack.',
      'Divide-and-conquer is a specific recursive pattern: split the problem into pieces, solve each piece recursively, then combine the results. Binary search is divide-and-conquer in one dimension; this quadrant search is the same idea in two.',
      'Recursion is a tool, not magic — anything recursive can also be written with an explicit loop and a manual stack. It\'s usually chosen because it mirrors the problem\'s own structure.'],
    mistakes:['A missing or incorrect base case — recursion that never reaches a stopping condition eventually overflows the call stack.','A recursive call that doesn\'t actually shrink the problem, so it never makes progress toward the base case.','Recomputing overlapping subproblems needlessly — that\'s the entire subject of the next chapter, dynamic programming.'],
    complexity:[{label:'This search',val:'O(log(area))'},{label:'Needs',val:'A base case + shrinking input'}],
    pseudocode:'function search(region):\n  if region is 1 cell: return region\n  split region into 4 quadrants\n  probe each; recurse into the one containing the target'},
  dp:{title:'Dynamic Programming',
    examples:[{label:'The bottom-up table',demoType:'cells',frames:genDPFrames},{label:'Without memoization',demoType:'cells',frames:genDPFrames2},{label:'House Robber: take or skip',demoType:'cells',frames:genDPFrames3}],
    oneLiner:'Answer every sub-question exactly once, and build bigger answers out of the small answers you already have stored.',
    explanation:[
      'Plain recursion can re-solve the exact same sub-problem many times over — for "cheapest way to reach gate i"-style problems, that duplication grows exponentially. Dynamic programming stores each sub-answer the first time it\'s computed and reuses it forever after.',
      'The "bottom-up" style fills a table in order, as shown here: each entry is built from a few earlier entries. The equivalent "top-down" style keeps the natural recursion but adds a cache (memoization) so no sub-problem is solved twice.',
      'Either way, the effect is the same: an exponential brute force collapses into something polynomial — usually linear or close to it.'],
    mistakes:['Writing plain recursion for an overlapping-subproblems situation and never adding memoization — correct, but exponentially slow.','Getting the recurrence\'s base case wrong, which quietly corrupts every value built on top of it.','Filling the table in the wrong order, so a value it depends on isn\'t ready yet when you need it.'],
    complexity:[{label:'This example',val:'O(n) time, O(n) space'},{label:'Naive recursion',val:'Exponential'}],
    pseudocode:'best[0] = 0\nfor i in 1..n:\n  best[i] = min(best[i-1], best[i-2], best[i-3]) + cost[i]'},
  parse:{title:'Parsing (Recursive Descent)',
    examples:[{label:'A nested signal decodes',demoType:'cells',frames:genParseFrames},{label:'Malformed input',demoType:'cells',frames:genParseFrames2}],
    oneLiner:'When the input\'s structure can nest inside itself, the code that reads it has to be able to call itself too.',
    explanation:[
      'Recursive descent parsing reads text left to right, and whenever it meets something that can contain a nested structure, it calls the SAME reading function on the inner piece before continuing.',
      'Flat tools like plain find-and-replace, or many regular expressions, can\'t handle arbitrary nesting because they have no way to track "how deep am I right now" — that bookkeeping is exactly what the call stack gives recursion for free.',
      'This is the same technique, at a larger scale, that reads JSON, compiles programming languages, and renders nested markup.'],
    mistakes:['Trusting the input\'s structure without validating brackets or tokens are balanced first.','Using a flat regex or find-and-replace on data that can nest arbitrarily deep — it works on shallow examples and quietly breaks on deep ones.','Off-by-one slicing indices when extracting the "inside" of a nested block.'],
    complexity:[{label:'Time',val:'O(n) in input length'},{label:'Handles nesting?',val:'Yes, natively'}],
    pseudocode:'function decode(s):\n  if s starts with a digit:\n    decode the bracketed block that follows (recurse)\n    repeat it that many times\n  else: copy the character through'},
  bst:{title:'Binary Search Trees',
    examples:[{label:'Search narrows one level at a time',demoType:'cells',frames:genBSTFrames},{label:'Sorted inserts degrade it to a line',demoType:'cells',frames:genBSTFrames2}],
    oneLiner:'Binary search\'s halving trick, generalized into an explicit shape: everything smaller lives one way, everything larger the other.',
    explanation:[
      'A binary search tree stores the same ordering guarantee binary search relies on — everything smaller one way, everything larger the other — but as an explicit shape instead of a sorted array. There\'s no midpoint to compute; the structure already encodes it, and searching just means following the comparison at each node.',
      'Insertion follows the identical logic as search: walk down comparing keys until you fall off the tree, then attach the new node there. Because search and insert share one walk, a BST supports fast lookups AND fast insertion — something a plain sorted array can\'t do without shifting everything after the insertion point.',
      'The catch is balance. A tree built from already-sorted input never branches — every new node becomes the only child of the last one, and search degrades from O(log n) to O(n), a straight line pretending to be a tree. Real-world BSTs (red-black trees, AVL trees) add rebalancing specifically to prevent this.'],
    mistakes:['Assuming any binary tree is a binary search tree — the ordering property must hold at every node, not just look roughly sorted.','Inserting already-sorted (or reverse-sorted) data and expecting O(log n) — without rebalancing, that\'s the worst case, not the average case.','Checking the equal case only at the very end instead of the moment a node matches, or forgetting it and looping past the target entirely.'],
    complexity:[{label:'Search/insert (balanced)',val:'O(log n)'},{label:'Search/insert (degenerate)',val:'O(n)'}],
    pseudocode:'function search(node, target):\n  if node is null: not found\n  if node.key === target: found\n  if target < node.key: search(node.left, target)\n  else: search(node.right, target)'},
  heap:{title:'Binary Heaps',
    examples:[{label:'Extract-min, then sift down',demoType:'cells',frames:genHeapFrames},{label:'Skipping the sift-down',demoType:'cells',frames:genHeapFrames2}],
    oneLiner:'An array secretly shaped like a tree, kept just orderly enough that the minimum (or maximum) is always at index 0.',
    explanation:[
      'A binary heap stores a tree\'s shape inside a flat array: node i\'s children live at 2i+1 and 2i+2, no pointers needed. A MIN-heap only guarantees each parent is less than or equal to both its children — nothing about siblings, and nothing sorted below the root.',
      'That weaker guarantee is what makes it fast: removing the minimum only has to fix ONE path from root to leaf (sift-down), not re-sort anything. Inserting is the mirror image — add at the end, then sift UP while the new value beats its parent.',
      'Chapter 12\'s priority queue and this heap solve the identical problem; the heap is just the O(log n) machine that makes the O(n) rescan unnecessary. Run extract-min repeatedly and you\'ve built heapsort for free.'],
    mistakes:['Treating the heap array as fully sorted — only the root is guaranteed to be the minimum; siblings have no defined order relative to each other.','Extracting the minimum but forgetting to sift the new root down — the array still looks plausible but silently stops behaving like a heap.','Comparing a node to only one child during sift-down instead of both, and swapping with the wrong one when the smaller child is on the other side.'],
    complexity:[{label:'Peek min',val:'O(1)'},{label:'Extract / insert',val:'O(log n)'}],
    pseudocode:'extractMin():\n  min = heap[0]\n  heap[0] = heap[last]; heap.pop()\n  siftDown(0)\n  return min\n\nsiftDown(i):\n  smallest = i; check children 2i+1, 2i+2\n  if a child is smaller: swap, i = that child, repeat'},
  greedy:{title:'Greedy Algorithms',
    examples:[{label:'Earliest finish time wins',demoType:'cells',frames:genGreedyFrames},{label:'Sorting by the wrong key',demoType:'cells',frames:genGreedyFrames2}],
    oneLiner:'Take the choice that looks best right now, and never reconsider it — correct only for problems where the local best is provably a global best.',
    explanation:[
      'A greedy algorithm builds a solution one locally-best decision at a time and never revisits it. That\'s a dangerous habit in general — but for a specific set of problems, a proof exists that the locally-best choice can never be beaten by planning ahead.',
      'Interval scheduling — maximize the count of non-overlapping intervals you can take — is the textbook example: sorting by EARLIEST FINISH TIME and taking every compatible interval in that order is provably optimal, because the interval that ends soonest always leaves the most room for everything after it.',
      'The trap is generalizing that confidence to every problem. Sort by duration or by start time instead, and greedy can strictly underperform — a short-but-badly-placed choice can block two better ones. Greedy needs its own correctness proof; it isn\'t a free strategy.'],
    mistakes:['Trusting that "the obviously good choice" is the greedy choice, without identifying and sorting by the actual key the proof depends on.','Assuming greedy is always at least close to optimal — for many problems (like 0/1 knapsack) it can be arbitrarily far from the right answer.','Only checking compatibility against the immediately previous choice instead of ALL previously chosen items — that misses conflicts with earlier choices.'],
    complexity:[{label:'Time (after sort)',val:'O(n log n)'},{label:'Always optimal?',val:'Only when provable'}],
    pseudocode:'sort items by finishing time\nlastEnd = -Infinity\nfor item in sorted order:\n  if item.start >= lastEnd:\n    take it; lastEnd = item.end'},
  twoptr:{title:'Two Pointers / Sliding Window',
    examples:[{label:'Shrink while it still qualifies',demoType:'cells',frames:genTwoPtrFrames},{label:'Stopping at the first fit',demoType:'cells',frames:genTwoPtrFrames2}],
    oneLiner:'Walk two indices through one pass — grow to gather, shrink to tighten — turning an O(n²) scan into O(n).',
    explanation:[
      'The brute-force answer to "shortest/longest span meeting some condition" checks every start and every end — O(n²) pairs. Two pointers keeps a left and a right index and only ever moves them FORWARD, never backtracking either one.',
      'The pattern applies whenever growing the window (moving right) and shrinking it (moving left) change the window\'s "goodness" in a predictable direction — grow to gather more, shrink to discard what\'s no longer needed, and stop shrinking the moment it wouldn\'t be valid anymore.',
      'Because each pointer only advances and never reverses, together they take at most 2n steps total across the whole scan — even though the window looks like it\'s re-examining data, the combined pointer movement is linear, not quadratic.'],
    mistakes:['Stopping at the FIRST window that satisfies the condition instead of continuing to shrink it — that finds a valid answer, not the shortest one.','Moving one pointer without undoing its contribution to the running total — the window\'s sum silently goes stale.','Reaching for two pointers on data where advancing a pointer doesn\'t move monotonically in the "right direction" for the condition being tracked.'],
    complexity:[{label:'Time',val:'O(n)'},{label:'Naive nested-loop version',val:'O(n²)'}],
    pseudocode:'left = 0; sum = 0\nfor right in 0..n-1:\n  sum += a[right]\n  while sum >= target:\n    record window [left, right] if shortest so far\n    sum -= a[left]; left++'},
  backtrack:{title:'Backtracking',
    examples:[{label:'Place, discover, undo',demoType:'grid',frames:genBacktrackFrames},{label:'Pruning vs. brute force',demoType:'cells',frames:genBacktrackFrames2}],
    oneLiner:'A search that commits to a choice, and the instant it proves unworkable, undoes exactly that choice and tries the next one.',
    explanation:[
      'Backtracking is a systematic trial-and-error search: make a choice, and the MOMENT it\'s proven unworkable — not just when the whole attempt fails — undo exactly that choice and try the next option. That single discipline turns "try everything" into something far cheaper in practice.',
      'The key optimization is pruning: checking a constraint (isSafe) BEFORE committing to a choice, so an entire doomed branch of possibilities is skipped instead of explored and rejected one leaf at a time. The earlier the prune, the more work it saves.',
      'It shares its shape with plain recursion and divide-and-conquer — a function calling itself on a smaller version of the problem — but adds an explicit UNDO step, since backtracking explores shared, mutable state (the board) instead of always passing fresh copies down.'],
    mistakes:['Checking validity only at the very end (after every choice is made) instead of pruning early with isSafe — correct, but explores exponentially more dead branches.','Forgetting to undo (remove) a choice before trying the next option at the same level — leftover state from the failed attempt corrupts the next one.','Checking a placement against only the most recent choice instead of ALL previously committed choices — a conflict with something placed several steps earlier goes undetected.'],
    complexity:[{label:'Worst case',val:'Exponential'},{label:'In practice',val:'Pruned far below worst case'}],
    pseudocode:'function solve(row):\n  if row === n: success\n  for col in 0..n-1:\n    if isSafe(row, col):\n      place(row, col)\n      if solve(row + 1): return true\n      remove(row, col)\n  return false'},
};

function renderCellsFrame(container,frame){
  container.innerHTML='';
  for(const row of frame.rows){
    const rowEl=document.createElement('div');rowEl.className='viz-row';
    if(row.label){const lbl=document.createElement('div');lbl.className='viz-rowlabel';lbl.textContent=row.label;rowEl.appendChild(lbl);}
    for(const c of row.cells){
      if(c.arrow){const a=document.createElement('div');a.className='viz-arrow';a.textContent='→';rowEl.appendChild(a);continue;}
      const cell=document.createElement('div');cell.className='vcell'+(c.cls?' '+c.cls:'');
      const tags=document.createElement('div');tags.className='vtags';tags.textContent=(c.tags&&c.tags.length)?c.tags.join(','):'';
      const box=document.createElement('div');box.className='vbox';box.textContent=c.text;
      cell.appendChild(tags);cell.appendChild(box);
      const sub=document.createElement('div');sub.className='vsub';sub.textContent=c.sub||'';cell.appendChild(sub);
      rowEl.appendChild(cell);

function renderGridFrame(container,frame){

class VizPlayer{
  constructor(host,type,frames){
    this.type=type;this.frames=frames;this.i=0;this.playing=false;this.timer=null;
    host.innerHTML=`<div class="viz">
      <div class="viz-content"></div>
      <div class="viz-caption"></div>
      <div class="viz-controls">
        <button class="vbtn" data-a="reset" title="Restart">⏮</button>
        <button class="vbtn" data-a="prev" title="Previous step">◂</button>
        <button class="vbtn" data-a="play" title="Play/pause">▶ Play</button>
        <button class="vbtn" data-a="next" title="Next step">▸</button>
        <span class="viz-frame"></span>
      </div></div>`;
    this.content=host.querySelector('.viz-content');
    this.caption=host.querySelector('.viz-caption');
    this.frameLbl=host.querySelector('.viz-frame');
    this.playBtn=host.querySelector('[data-a="play"]');
    host.querySelector('[data-a="reset"]').addEventListener('click',()=>this.goto(0));
    host.querySelector('[data-a="prev"]').addEventListener('click',()=>{this.stop();this.goto(this.i-1);});
    host.querySelector('[data-a="next"]').addEventListener('click',()=>{this.stop();this.goto(this.i+1);});
    this.playBtn.addEventListener('click',()=>this.togglePlay());
    this.render();
  }
  goto(i){this.i=Math.max(0,Math.min(this.frames.length-1,i));this.render();}
  render(){
    const f=this.frames[this.i];
    if(this.type==='grid')renderGridFrame(this.content,f);else renderCellsFrame(this.content,f);
    this.caption.textContent=f.caption||'';
    this.frameLbl.textContent=`Step ${this.i+1} / ${this.frames.length}`;
  }
  togglePlay(){
    if(this.playing){this.stop();return;}
    this.playing=true;this.playBtn.textContent='⏸ Pause';
    const step=()=>{
      if(this.i>=this.frames.length-1){this.stop();return;}
      this.goto(this.i+1);
      this.timer=setTimeout(step,1100);
    };
    this.timer=setTimeout(step,1100);
  }
  stop(){this.playing=false;if(this.playBtn)this.playBtn.textContent='▶ Play';if(this.timer)clearTimeout(this.timer);this.timer=null;}
}

/* ---------- error locations ---------- */
/* new Function() compiles as: line1 "function anonymous(args" /
   line2 ") {" / line3 '"use strict";' / line4 = user line 1.
   The guard injector never adds newlines, so lines are preserved.
   (stackLine/curUserLine, which do the actual -3 correction, live
   next to opTick in the interpreter section above.) */
function errLine(e,lineCount){
  const ln=stackLine(e&&e.stack);
  return (ln!==null&&ln<=lineCount)?ln:null;
}
function describeError(e,code){
  let msg=e.message||String(e);
  const lines=code.split('\n');
  const ln=errLine(e,lines.length);
  if(ln){
    let snip=lines[ln-1].trim();
    if(snip.length>52)snip=snip.slice(0,52)+'…';
    msg+=`   [line ${ln}: ${snip}]`;
  }
  return msg;
}
/* string/comment-aware bracket balance report for syntax errors */
function bracketReport(src){
  const open=[],pairs={')':'(',']':'[','}':'{'};
  let line=1,i=0;
  while(i<src.length){
    const c=src[i];
    if(c==='\n'){line++;i++;continue;}
    if(c==='"'||c==="'"||c==='`'){const q=c;i++;
      while(i<src.length){if(src[i]==='\\'){i+=2;continue;}if(src[i]==='\n')line++;if(src[i]===q){i++;break;}i++;}continue;}
    if(c==='/'&&src[i+1]==='/'){while(i<src.length&&src[i]!=='\n')i++;continue;}
    if(c==='/'&&src[i+1]==='*'){while(i<src.length&&!(src[i]==='*'&&src[i+1]==='/')){if(src[i]==='\n')line++;i++;}i+=2;continue;}
    if(c==='('||c==='['||c==='{')open.push([c,line]);
    else if(c in pairs){
      if(!open.length||open[open.length-1][0]!==pairs[c])return `Stray “${c}” on line ${line} with no matching “${pairs[c]}”.`;
      open.pop();
    }
    i++;
  }
  if(open.length){const [ch,ln]=open[open.length-1];return `“${ch}” opened on line ${ln} is never closed.`;}
  return null;
}

async function applyAction(a){

    case 'turn':viewWorld.robot.dir=a.dir;updateRobot();SFX.turn();await sleep(delay(110));break;
    case 'bump':robotEl.classList.add('bump');cline('· clunk — that\'s a wall.','c-warn');SFX.bump();
      await sleep(delay(200));robotEl.classList.remove('bump');break;
    case 'ping':{const el=tileEls[a.y]?.[a.x];if(el){el.classList.add('ping');SFX.ping();await sleep(delay(90));el.classList.remove('ping');}break;}
    case 'pingRect':{const els=[];
      for(let y=a.y1;y<=a.y2;y++)for(let x=a.x1;x<=a.x2;x++){const el=tileEls[y]?.[x];if(el){el.classList.add('ping');els.push(el);}}
      SFX.ping();await sleep(delay(320));
      for(const el of els)el.classList.remove('ping');
      await sleep(delay(80));break;}
    case 'reveal':{const t=viewWorld.tiles[a.y][a.x];t.revealed=true;t.label=a.label;if(a.cls)t.revealCls=a.cls;
      renderTile(a.x,a.y);SFX.reveal();await sleep(delay(220));break;}
    case 'fix':{const t=viewWorld.tiles[a.y][a.x];t.fixed=true;renderTile(a.x,a.y);
      cline('» replacement cell seated. voltage nominal.','c-ok');SFX.ok();await sleep(delay(300));break;}
    case 'open':{const t=viewWorld.tiles[a.y][a.x];t.opened=a.ok?'ok':'bad';renderTile(a.x,a.y);
      (a.ok?SFX.ok:SFX.bad)();await sleep(delay(300));break;}
    case 'swap':{const A=viewWorld.tiles[1][a.i+1],B=viewWorld.tiles[1][a.j+1];
      [A.weight,B.weight]=[B.weight,A.weight];
      [A.label,B.label]=[B.label,A.label];
      [A.revealed,B.revealed]=[B.revealed,A.revealed];
      renderTile(a.i+1,1);renderTile(a.j+1,1);await sleep(delay(240));break;}
    case 'report':cline('» '+a.msg,'c-report');await sleep(delay(60));break;
    case 'note':cline('· '+a.msg,'c-info');await sleep(delay(90));break;
    case 'mark':{const t=viewWorld.tiles[a.y][a.x];t.mark=a.cls;renderTile(a.x,a.y);
      if(a.cls==='ok')SFX.mark();if(a.cls==='bad')SFX.bad();await sleep(delay(220));break;}
    case 'win':if(viewWorld.robot){robotEl.classList.add('win');}
      SFX.win();

      }

  }
}

/* ---------- run flow ---------- */
function countCodeLines(code){
  return code.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('//')).length;
}
function statsOf(sim){
  const parts=[];
  for(const[k,v]of Object.entries(sim.counts))parts.push(`${k}: ${v}`);
  return parts.join(', ');
}
async function runProgram(){
  if(running)return false;
  running=true;$('#runBtn').disabled=true;
  try{
    cclear();
    const level=activeLevel(),code=editor.value;
    localStorage.setItem('cs_code_'+level.id,code);
    if(level.lineBudget){
      const n=countCodeLines(code);
      if(n>level.lineBudget){
        cline(`✗ Uplink buffer overflow: your program is ${n} lines; the buffer holds ${level.lineBudget}.`,'c-err');
        cline('  Byte: "The stairwell repeats itself. Perhaps your code should too — with a loop."','c-warn');
        return false;
      }
    }
    const sims=level.seeds.map((s,i)=>runTrial(level,s,code,i));
    if(sims[0].compileError){cline('✗ '+sims[0].failed,'c-err');return false;}
    const failIdx=sims.findIndex(s=>!s.won);
    const showIdx=failIdx===-1?0:failIdx;
    cline(`▶ Uploading program… running ${sims.length} trial${sims.length>1?'s':''}. Replaying trial ${showIdx+1}.`);
    await replayTrial(level,level.seeds[showIdx],sims[showIdx].actions,showIdx);
    sims.forEach((s,i)=>{
      if(s.won)cline(`✓ Trial ${i+1}: objective complete${statsOf(s)?'  ('+statsOf(s)+')':''}`,'c-ok');
      else cline(`✗ Trial ${i+1}: ${s.failed||'program ended before the objective was met.'}`,'c-err');
    });
    if(failIdx===-1){
      const kind=level.side?'SIDE MISSION':level.primer?'LESSON':'CHAPTER';
      cline('',''); cline(`✓ ${kind} COMPLETE — `+level.success,'c-ok');
      failCounts[level.id]=0;
      if(level.side){
        localStorage.setItem('cs_side_'+level.id,'1');
        renderSideButton();
      }else if(level.primer){
        const done=+(localStorage.getItem('cs_primer_done')||0);
        if(level.idx>=done)localStorage.setItem('cs_primer_done',String(level.idx+1));
      }else if(cur>=unlocked){
        unlocked=cur+1;localStorage.setItem('cs_unlocked',unlocked);
        renderSideButton();
      }
      renderChips();
      if(!CS.instant){await sleep(700);showCard(level);}
      return true;
    }
    SFX.bad();
    const fails=failCounts[level.id]=(failCounts[level.id]||0)+1;
    const hints=HINTS[level.id];
    if(hints&&(fails===2||fails===4)){
      cline('','');
      cline('◈ HALCYON — recovered fragment: '+(fails===2?hints[0]:hints[1]),'c-warn');
    }
    return false;
  }finally{running=false;$('#runBtn').disabled=false;}
}

const TOUR_STEPS=[
  {target:'#mission .box',title:'Your Objective',
    body:'This panel holds your current mission. Read the story above for clues, then check the objective and Byte\'s command list below it.',
    action:'click',hint:'👉 Click the Objective box to continue.'},
  {target:'#editor',title:'The Command Deck',
    body:'You write real JavaScript here. A starter template is already loaded — the comments show you where your commands go.',
    action:'focus',hint:'👉 Click inside the editor to continue.'},
  {target:'#runBtn',title:'Watch Byte Move',
    body:'This uploads your program and replays exactly what happened in the viewport. Pass or fail, you\'ll see why — and STEP (top right) lets you pause after every single command.',
    action:'click',hint:'👉 Click ▶ Run to continue.'},
  {target:'#console',title:'Automated Quality Check',
    body:'Every run is judged right here. Later chapters test your program against several randomized layouts too — proof it is a general solution, not a lucky guess on one map.',
    action:'button',hint:''},
];
let tourActive=false,tourIdx=0,tourActionTarget=null,tourActionHandler=null,tourActionEvent=null;
function startTour(force){
  if(!force&&localStorage.getItem('cs_seen_tour'))return;
  if(primerActive||sideActive)return;
  tourActive=true;tourIdx=0;
  $('#tourBackdrop').classList.add('show');
  $('#tourGlow').classList.add('show');
  $('#tourCard').classList.add('show');
  window.addEventListener('resize',positionTourStep);
  renderTourStep();
}
function endTour(){
  tourActive=false;
  localStorage.setItem('cs_seen_tour','1');
  $('#tourBackdrop').classList.remove('show');
  $('#tourGlow').classList.remove('show');
  $('#tourCard').classList.remove('show');
  window.removeEventListener('resize',positionTourStep);
  detachTourAction();
}
function detachTourAction(){
  if(tourActionTarget&&tourActionHandler)tourActionTarget.removeEventListener(tourActionEvent,tourActionHandler);
  tourActionTarget=null;tourActionHandler=null;tourActionEvent=null;
}
function renderTourStep(){
  detachTourAction();
  const step=TOUR_STEPS[tourIdx];
  const target=document.querySelector(step.target);
  $('#tourStepLbl').textContent=`Step ${tourIdx+1} of ${TOUR_STEPS.length}`;
  $('#tourTitle').textContent=step.title;
  $('#tourBody').textContent=step.body;
  $('#tourHint').textContent=step.hint;
  $('#tourBackBtn').classList.toggle('hidden',tourIdx===0);
  const nextBtn=$('#tourNextBtn');
  if(step.action==='button'){
    nextBtn.textContent="Let's Save the Ship! ▸";
    nextBtn.disabled=false;
    nextBtn.onclick=endTour;
  }else{
    nextBtn.textContent='Next ▸';
    nextBtn.disabled=true;
    nextBtn.onclick=null;
    if(target){
      tourActionTarget=target;
      tourActionEvent=step.action;
      tourActionHandler=()=>{
        nextBtn.disabled=false;
        setTimeout(()=>{if(tourActive&&TOUR_STEPS[tourIdx]===step)advanceTour();},380);
      };
      target.addEventListener(tourActionEvent,tourActionHandler,{once:true});
    }
  }
  positionTourStep();
}
function advanceTour(){
  if(tourIdx<TOUR_STEPS.length-1){tourIdx++;renderTourStep();}
  else endTour();
}
function positionTourStep(){
  if(!tourActive)return;
  const step=TOUR_STEPS[tourIdx];
  const target=document.querySelector(step.target);
  if(!target){endTour();return;}
  const r=target.getBoundingClientRect();
  const pad=6;
  const x1=Math.max(0,r.left-pad),y1=Math.max(0,r.top-pad);
  const x2=Math.min(window.innerWidth,r.right+pad),y2=Math.min(window.innerHeight,r.bottom+pad);
  $('#tourBackdrop').style.clipPath=
    `polygon(evenodd,0 0,100% 0,100% 100%,0 100%,0 ${y1}px,${x2}px ${y1}px,${x2}px ${y2}px,${x1}px ${y2}px,${x1}px ${y1}px)`;
  const glow=$('#tourGlow');
  glow.style.left=x1+'px';glow.style.top=y1+'px';
  glow.style.width=(x2-x1)+'px';glow.style.height=(y2-y1)+'px';
  const card=$('#tourCard'),cw=320,margin=16;
  const spaceBelow=window.innerHeight-y2,spaceAbove=y1;
  let top;
  if(spaceBelow>160)top=y2+14;
  else if(spaceAbove>160)top=Math.max(margin,y1-14-260);
  else top=Math.max(margin,Math.min(window.innerHeight-280,(y1+y2)/2-130));
  const left=Math.min(window.innerWidth-cw-margin,Math.max(margin,r.left));
  card.style.top=top+'px';
  card.style.left=left+'px';
}
$('#tourBackBtn').addEventListener('click',()=>{if(tourIdx>0){tourIdx--;renderTourStep();}});

    const b=document.createElement('button');
    b.className='chip'+(i===cur&&!primerActive?' cur':'')+(i<unlocked?' done':'');
    b.textContent=String(i+1);
    b.title=`Chapter ${i+1}: ${lv.title} — ${lv.concept}`;
    b.disabled=i>unlocked;
    b.addEventListener('click',()=>loadLevel(i));
    nav.appendChild(b);
  });
}
function loadLevel(i){
  cur=i;
  sideActive=null;primerActive=null;
  const lv=LEVELS[i];
  const season=i<7?1:i<12?2:i<15?3:i<18?4:5;
  document.querySelector('.brand .sub').textContent=['SIGNAL LOST','COLD STORAGE','THE RELAY NETWORK','FIRST CONTACT','THE DEEP ARCHIVE'][season-1];
  $('#lv-kicker').textContent=`Season ${season} · Chapter ${i+1} of ${LEVELS.length}`;
  $('#lv-title').textContent=lv.title;
  $('#lv-concept').textContent=lv.concept;
  $('#fname').textContent=`chapter_${i+1}.js`;
  const comms=$('#lv-comms');comms.innerHTML='';
  for(const [who,say] of lv.brief){
    const d=document.createElement('div');
    d.className=who.toLowerCase();
    const w=document.createElement('div');w.className='who';w.textContent=who;
    const s=document.createElement('div');s.className='say';s.textContent=say;
    d.appendChild(w);d.appendChild(s);comms.appendChild(d);
  }
  $('#lv-objective').textContent=lv.objective;
  $('#lv-budget').textContent=lv.lineBudget?`⚠ Uplink buffer: max ${lv.lineBudget} lines of code.`:'';
  renderHowItWorks(lv);
  const apiEl=$('#lv-api');apiEl.innerHTML='';
  for(const [sig,doc] of lv.api){
    const d=document.createElement('div');d.className='fn';
    const s=document.createElement('div');s.className='sig';s.textContent=sig;
    const dd=document.createElement('div');dd.className='doc';dd.textContent=doc;
    d.appendChild(s);d.appendChild(dd);apiEl.appendChild(d);
  }
  $('#hud').innerHTML=`DECK ${i+1} · <b>${lv.title.toUpperCase()}</b> · TRIALS: ${lv.seeds.length}`;
  editor.value=localStorage.getItem('cs_code_'+lv.id)??lv.starter;
  refreshEditor();
  cclear();
  cline(`— Chapter ${i+1}: ${lv.title} —`);
  cline('Byte is standing by. Press ▶ Run to upload your program.');
  renderWorld(lv.build(mulberry32(lv.seeds[0])));
  renderChips();
  renderSideButton();
  if(i===7&&!localStorage.getItem('cs_seen_s2')&&!CS.instant){
    localStorage.setItem('cs_seen_s2','1');
    showS2Intro();
  }
  if(i===12&&!localStorage.getItem('cs_seen_s3')&&!CS.instant){
    localStorage.setItem('cs_seen_s3','1');
    showS3Intro();
  }
  if(i===15&&!localStorage.getItem('cs_seen_s4')&&!CS.instant){
    localStorage.setItem('cs_seen_s4','1');
    showS4Intro();
  }
  if(i===18&&!localStorage.getItem('cs_seen_s5')&&!CS.instant){
    localStorage.setItem('cs_seen_s5','1');
    showS5Intro();
  }
}

function showShipLog(){
  const seasons=[
    {name:'Season 1 · Signal Lost — algorithms',from:0,to:6},
    {name:'Season 2 · Cold Storage — data structures',from:7,to:11},
    {name:'Season 3 · The Relay Network — graphs',from:12,to:14},
    {name:'Season 4 · First Contact — techniques',from:15,to:17},
    {name:'Season 5 · The Deep Archive — trees, heaps, techniques',from:18,to:22},
  ];
  let html='<p>Every concept this ship has taught you, and where you are. This list doubles as a syllabus — screenshot it.</p>';
  for(const s of seasons){
    html+=`<p style="margin-bottom:4px"><b>${s.name}</b></p><ul>`;
    for(let i=s.from;i<=s.to;i++){
      const lv=LEVELS[i],done=i<unlocked;
      html+=`<li style="list-style:none;margin-left:-20px">`+
        `<code>${done?'✓':'—'}</code> Ch ${String(i+1).padStart(2,'0')} · ${lv.title} — <b>${lv.concept}</b></li>`;
    }
    html+='</ul>';
  }
  const doneCount=Math.min(unlocked,LEVELS.length);
  html+=`<div class="real"><div class="bt">Status</div>${doneCount} of ${LEVELS.length} chapters complete.`+
    (doneCount===LEVELS.length?' Curriculum clear — your real Season 5 runs outside this game.':' The layouts reshuffle on every run; your programs won\'t mind.')+'</div>';
  openModal('Ship log · Meridian','What you\'ve learned so far',html,'Close',null);
}

/* ---------- solution share links ---------- */
function buildShareUrl(level,code){
  const payload=btoa(unescape(encodeURIComponent(code)));
  const url=new URL(location.href);
  url.hash=`lvl=${encodeURIComponent(level.id)}&code=${payload}`;
  return url.toString();
}
function decodeShareCode(payload){
  try{return decodeURIComponent(escape(atob(payload)));}
  catch(e){return null;}
}
async function copyText(text){
  try{await navigator.clipboard.writeText(text);return true;}
  catch(e){
    try{
      const ta=document.createElement('textarea');
      ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.focus();ta.select();
      const ok=document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    }catch(e2){return false;}
  }
}
function applyShareLink(){
  const h=location.hash.replace(/^#/,'');
  if(!h)return false;
  const params=new URLSearchParams(h);
  const lvlId=params.get('lvl'),payload=params.get('code');
  if(!lvlId||!payload)return false;
  const code=decodeShareCode(payload);
  if(code===null)return false;
  const msg='🔗 Loaded a shared solution. Press ▶ Run to see it in action, or keep editing.';
  const idx=LEVELS.findIndex(l=>l.id===lvlId);
  if(idx>=0){loadLevel(idx);editor.value=code;refreshEditor();cline(msg,'c-warn');return true;}
  const sm=SIDE_MISSIONS.find(s=>s.id===lvlId);
  if(sm){loadSideMission(sm);editor.value=code;refreshEditor();cline(msg,'c-warn');return true;}
  const pm=PRIMER.find(p=>p.id===lvlId);
  if(pm){loadPrimer(pm.idx);editor.value=code;refreshEditor();cline(msg,'c-warn');return true;}
  return false;
}

/* ---------- drag-to-resize panels ---------- */
function makeResizer(handle,{axis,cssVar,min,max,def,direction=1,step=16}){
  if(!handle)return;
  const root=document.documentElement;
  const storeKey='cs_rz_'+cssVar;
  const stored=localStorage.getItem(storeKey);
  if(stored)root.style.setProperty('--'+cssVar,stored+'px');
  const getPx=()=>parseFloat(getComputedStyle(root).getPropertyValue('--'+cssVar))||def;
  const setPx=(px)=>{
    px=Math.max(min,Math.min(max,Math.round(px)));
    root.style.setProperty('--'+cssVar,px+'px');
    localStorage.setItem(storeKey,String(px));
  };
  let dragging=false,startPos=0,startSize=0;
  const bodyCls='resizing-'+axis;
  handle.addEventListener('pointerdown',(e)=>{
    dragging=true;handle.classList.add('active');
    handle.setPointerCapture?.(e.pointerId);
    startPos=axis==='x'?e.clientX:e.clientY;
    startSize=getPx();
    document.body.classList.add(bodyCls);
    e.preventDefault();
  });
  handle.addEventListener('pointermove',(e)=>{
    if(!dragging)return;
    const pos=axis==='x'?e.clientX:e.clientY;
    setPx(startSize+(pos-startPos)*direction);
  });
  const end=(e)=>{
    if(!dragging)return;
    dragging=false;handle.classList.remove('active');
    document.body.classList.remove(bodyCls);
    if(handle.hasPointerCapture?.(e.pointerId))handle.releasePointerCapture(e.pointerId);
  };
  handle.addEventListener('pointerup',end);
  handle.addEventListener('pointercancel',end);
  handle.addEventListener('dblclick',()=>{
    root.style.removeProperty('--'+cssVar);
    localStorage.removeItem(storeKey);
  });
  handle.addEventListener('keydown',(e)=>{
    const keys=axis==='x'?['ArrowLeft','ArrowRight']:['ArrowUp','ArrowDown'];
    if(!keys.includes(e.key))return;
    e.preventDefault();
    setPx(getPx()+(e.key===keys[1]?1:-1)*direction*step);
  });
}
makeResizer($('#rzMission'),{axis:'x',cssVar:'mission-w',min:220,max:480,def:310,direction:1});
makeResizer($('#rzRight'),{axis:'x',cssVar:'game-w',min:320,max:640,def:430,direction:-1});
makeResizer($('#rzConsole'),{axis:'y',cssVar:'console-h',min:80,max:500,def:210,direction:-1});

editor.addEventListener('keydown',(e)=>{
  if(e.key==='Tab'){e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'  '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+2;
    refreshEditor();}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runProgram();}
});
editor.addEventListener('input',refreshEditor);
editor.addEventListener('scroll',syncEditorScroll);

/* debug / test hooks */
const CS={levels:LEVELS,sides:SIDE_MISSIONS,primer:PRIMER,concepts:CONCEPTS,conceptOrder:CONCEPT_ORDER,
  load:loadLevel,run:runProgram,instant:false,
  runCode:async(code)=>{editor.value=code;return runProgram();},
  loadSide:(i)=>loadSideMission(SIDE_MISSIONS[i]),
  loadPrimer:(i)=>loadPrimer(i),
  openLearn:(id)=>openLearn(id),closeLearn:()=>closeLearn(),
  buildShareUrl,decodeShareCode,
