<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<!-- ARTIFACT-START -->
<title>Code Story — Signal Lost</title>
<style>
  :root{
    --bg:#070b12; --panel:#0e1520; --panel2:#0a101a; --line:#1c2939; --line2:#243549;
    --text:#c9d5e0; --muted:#71818f; --accent:#53d6c6; --accent-dim:#2b6e66;
    --amber:#e0a458; --good:#66d188; --bad:#e5545e;
    --mono:ui-monospace,"SFMono-Regular","Cascadia Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.5;min-height:100vh}
  button{font-family:var(--mono);cursor:pointer}
  button:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .brand{font-weight:700;letter-spacing:.18em;font-size:15px;white-space:nowrap}
  .brand .sub{color:var(--amber);font-weight:400;letter-spacing:.12em}
  .brand .dot{color:var(--accent)}
  #chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{background:var(--panel);border:1px solid var(--line2);color:var(--muted);padding:4px 10px;font-size:12px;letter-spacing:.06em;border-radius:2px}
  .chip:not(:disabled):hover{border-color:var(--accent-dim);color:var(--text)}
  .chip.cur{border-color:var(--accent);color:var(--accent)}
  .chip.done::after{content:" ✓";color:var(--good)}
  .chip:disabled{opacity:.35;cursor:not-allowed}
  #speed{margin-left:auto;background:none;border:1px solid var(--line2);color:var(--muted);padding:4px 10px;font-size:12px;letter-spacing:.08em;border-radius:2px}
  #speed:hover{color:var(--text);border-color:var(--accent-dim)}

  /* ---------- layout ---------- */
  main{display:grid;grid-template-columns:310px minmax(0,1fr) 430px;gap:0;min-height:calc(100vh - 49px)}
  main>*{min-width:0}
  @media (max-width:1150px){
    main{grid-template-columns:1fr;min-height:0}
    #mission{border-right:none;border-bottom:1px solid var(--line)}
    #right{border-left:none;border-top:1px solid var(--line)}
    #editor{min-height:220px}
  }

  /* ---------- mission panel ---------- */
  #mission{border-right:1px solid var(--line);padding:18px;overflow-y:auto;background:var(--panel2)}
  .kicker{font-size:11px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
  #lv-title{font-size:19px;font-weight:700;letter-spacing:.04em;margin:2px 0 2px;text-wrap:balance}
  #lv-concept{display:inline-block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-dim);padding:2px 8px;border-radius:2px;margin-bottom:14px}
  .comms{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .comms .who{font-size:11px;letter-spacing:.16em;margin-bottom:1px}
  .comms .halcyon .who{color:var(--amber)}
  .comms .byte .who{color:var(--accent)}
  .comms .you .who{color:var(--muted)}
  .comms .say{font-family:var(--sans);font-size:13.5px;color:var(--text);max-width:62ch}
  .comms .halcyon .say{color:var(--amber);opacity:.9}
  .box{border:1px solid var(--line2);border-radius:2px;padding:10px 12px;margin-bottom:14px;background:var(--panel)}
  .box .bt{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  #lv-objective{font-family:var(--sans);font-size:13.5px}
  #lv-budget{color:var(--amber);font-size:12.5px;margin-top:6px}
  #lv-api{display:flex;flex-direction:column;gap:8px}
  #lv-api .fn{font-size:12.5px}
  #lv-api .sig{color:var(--accent)}
  #lv-api .doc{color:var(--muted);font-family:var(--sans);font-size:12.5px}

  /* ---------- viewport ---------- */
  #viewport{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:
    radial-gradient(ellipse 90% 70% at 50% 30%, #0b1322 0%, var(--bg) 70%);position:relative;overflow:auto}
  #hud{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
  #hud b{color:var(--text);font-weight:400}
  #gridwrap{position:relative}
  #grid{position:relative;display:grid;gap:2px}
  .tile{width:40px;height:40px;border-radius:2px;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column}
  .t-wall{background:#1a2740;border:1px solid #2a3a58;box-shadow:inset 0 2px 0 rgba(255,255,255,.05)}
  .t-floor{background:#090f1a;border:1px solid #101a29}
  .t-console{background:#0a1a1c;border:1px solid var(--accent-dim);animation:pulse 1.6s ease-in-out infinite}
  .t-console::before{content:"▣";color:var(--accent);font-size:18px}
  .t-airlock{background:#0a1a1c;border:1px solid var(--accent-dim);animation:pulse 1.6s ease-in-out infinite}
  .t-airlock::before{content:"◎";color:var(--accent);font-size:18px}
  .t-debris{background:#0a111d;border:1px solid #3a2a1c}
  .t-debris::before{content:"◆";color:var(--amber);font-size:15px}
  .t-cell,.t-cabinet,.t-crate{background:#0d1626;border:1px solid #22304a}
  .t-cell::before{content:"▮";color:#41546e;font-size:13px}
  .t-cell.revealed.dead{border-color:var(--bad)}
  .t-cell.revealed.dead::before{color:var(--bad)}
  .t-cell.revealed.live::before{color:var(--good)}
  .t-cell.fixed{border-color:var(--good);background:#0c1f16}
  .t-cell.fixed::before{content:"▮";color:var(--good)}
  .t-cabinet::before{content:"▤";color:#41546e;font-size:14px}
  .t-cabinet.revealed::before{color:var(--accent)}
  .t-cabinet.open-ok{border-color:var(--good);background:#0c1f16}
  .t-cabinet.open-bad{border-color:var(--bad);background:#241014}
  .t-crate::before{content:"▦";color:#5b6d85;font-size:15px}
  .t-crate.revealed::before{color:var(--accent)}
  .t-crate.sorted{border-color:var(--good)}
  .t-crate.sorted::before{color:var(--good)}
  .t-seal{background:#0d1626;border:1px solid #22304a}
  .t-seal::before{content:"▬";color:#41546e;font-size:13px}
  .t-seal.revealed::before{color:var(--amber)}
  .t-pod{background:#0d1626;border:1px solid #22304a}
  .t-pod::before{content:"❆";color:#41546e;font-size:14px}
  .t-pod.revealed.alert::before{color:var(--amber)}
  .t-node{background:#0d1626;border:1px solid #22304a}
  .t-node::before{content:"◉";color:#5b6d85;font-size:13px}
  .t-node.corrupt{border-color:#5a2a30}
  .t-node.corrupt::before{color:var(--bad)}
  .t-record{background:#0d1626;border:1px solid #22304a}
  .t-record::before{content:"▤";color:#41546e;font-size:12px}
  .t-record.revealed::before{color:var(--accent)}
  .t-rad{background:#0d1420;border:1px solid #1c2939}
  .t-rad .tlabel{font-size:11px;margin-top:0}
  .rad-l{background:#0b1a14;border-color:#1e3a2b}
  .rad-l .tlabel{color:#7fd9a0}
  .rad-m{background:#181409;border-color:#3a2f18}
  .rad-m .tlabel{color:#e0c078}
  .rad-h{background:#1d0e10;border-color:#4a2028}
  .rad-h .tlabel{color:#e58a92}
  .t-sys{background:#0d1626;border:1px solid #22304a}
  .t-sys::before{content:"◈";color:#5b6d85;font-size:13px}
  .goalcell{border-color:var(--accent-dim);animation:pulse 1.6s ease-in-out infinite}
  .tile.mark-ok{border-color:var(--good);background:#0c1f16}
  .tile.mark-ok::before{color:var(--good)}
  .tile.mark-bad{border-color:var(--bad);background:#241014}
  .tile.mark-bad::before{color:var(--bad)}
  .tile.mark-dim{opacity:.3}
  .tlabel{font-size:9px;line-height:1;color:var(--muted);margin-top:1px;font-variant-numeric:tabular-nums}
  .tidx{position:absolute;top:1px;left:3px;font-size:8px;line-height:1;color:#42546d;font-variant-numeric:tabular-nums}
  .sdiv{color:var(--muted);font-size:10px;letter-spacing:.14em;align-self:center;padding:0 4px;user-select:none}
  .revealed .tlabel{color:var(--text)}
  .tile.ping{box-shadow:0 0 0 2px var(--accent)}
  @keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(83,214,198,.15)}50%{box-shadow:0 0 14px rgba(83,214,198,.5)}}
  #robot{position:absolute;width:40px;height:40px;transition:transform .13s linear;z-index:5;pointer-events:none}
  #robot .body{position:absolute;inset:6px;background:var(--accent);border-radius:4px;transition:transform .13s linear;
    box-shadow:0 0 12px rgba(83,214,198,.55)}
  #robot .body::before{content:"";position:absolute;top:3px;left:50%;transform:translateX(-50%);width:8px;height:5px;background:#062521;border-radius:1px}
  #robot.bump .body{background:var(--bad);box-shadow:0 0 12px rgba(229,84,94,.6)}
  #robot.win .body{background:var(--good);box-shadow:0 0 18px rgba(102,209,136,.8)}
  @media (prefers-reduced-motion:reduce){
    #robot,#robot .body{transition:none}
    .t-console,.t-airlock{animation:none}
  }

  /* ---------- right: editor + console ---------- */
  #right{border-left:1px solid var(--line);display:flex;flex-direction:column;background:var(--panel2)}
  #edhead{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line)}
  #edhead .fname{font-size:12px;letter-spacing:.12em;color:var(--muted)}
  #edhead .fname b{color:var(--text);font-weight:400}
  #edhead .spacer{flex:1}
  .btn{border:1px solid var(--line2);background:var(--panel);color:var(--text);padding:5px 14px;font-size:12px;letter-spacing:.1em;border-radius:2px;text-transform:uppercase}
  .btn:hover{border-color:var(--accent-dim)}
  .btn.primary{border-color:var(--accent);color:var(--accent)}
  .btn.primary:hover{background:rgba(83,214,198,.08)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  #editor{flex:1;min-height:260px;resize:none;border:none;background:var(--panel2);color:var(--text);
    font-family:var(--mono);font-size:13.5px;line-height:1.6;padding:12px 14px;tab-size:2}
  #console{height:210px;overflow-y:auto;border-top:1px solid var(--line);padding:10px 14px;background:#060a10;font-size:12.5px;line-height:1.7}
  #console div{white-space:pre-wrap;word-break:break-word}
  .c-info{color:var(--muted)} .c-err{color:var(--bad)} .c-ok{color:var(--good)}
  .c-report{color:var(--accent)} .c-warn{color:var(--amber)}

  /* ---------- modal ---------- */
  #overlay{position:fixed;inset:0;background:rgba(4,7,12,.78);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  #overlay.show{display:flex}
  #modal{background:var(--panel);border:1px solid var(--line2);border-top:2px solid var(--accent);max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:26px 30px;border-radius:2px}
  #modal .kicker{color:var(--accent)}
  #modal h2{margin:4px 0 14px;font-size:20px;letter-spacing:.03em;text-wrap:balance}
  #modal .mbody{font-family:var(--sans);font-size:14px;color:var(--text)}
  #modal .mbody p{margin:0 0 12px;max-width:60ch}
  #modal .mbody ul{margin:0 0 12px;padding-left:20px}
  #modal .mbody li{margin-bottom:6px;max-width:56ch}
  #modal .mbody code{font-family:var(--mono);font-size:12.5px;color:var(--accent);background:#0a141c;padding:1px 5px;border-radius:2px}
  #modal .real{border-left:2px solid var(--amber);padding:8px 12px;margin:14px 0;background:rgba(224,164,88,.06)}
  #modal .real .bt{font-size:11px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
  #modal .actions{display:flex;justify-content:flex-end;margin-top:18px}
</style>

      <span class="fname">▸ <b id="fname">chapter_1.js</b></span>

<script>
"use strict";
/* ============================================================
   CODE STORY — SIGNAL LOST
   A playable prototype that teaches algorithms through a
   robot-programming story. Everything is self-contained.
   ============================================================ */

const TILE = 40, GAP = 2, PITCH = TILE + GAP;
const DIRS = [[0,-1],[1,0],[0,1],[-1,0]]; // N E S W
const OPS_MAX = 20000, GUARD_MAX = 100000;

/* ---------- seeded rng ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const ri=(rng,min,max)=>min+Math.floor(rng()*(max-min+1));

/* ---------- world helpers ---------- */
function emptyWorld(w,h){
  const tiles=[];
  for(let y=0;y<h;y++){tiles.push([]);for(let x=0;x<w;x++)tiles[y].push({type:'wall'});}
  return {w,h,tiles,robot:null,meta:{}};
}
function worldFromRows(rows){
  const h=rows.length,w=rows[0].length,world=emptyWorld(w,h);
  const rchars={'>':1,'<':3,'^':0,'v':2};
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const c=rows[y][x],t=world.tiles[y][x];
    if(c==='#'){t.type='wall';continue;}
    t.type='floor';
    if(c==='C')t.type='console';
    if(c in rchars)world.robot={x,y,dir:rchars[c]};
  }
  return world;
}
const tileAt=(world,x,y)=>(x<0||y<0||x>=world.w||y>=world.h)?{type:'wall'}:world.tiles[y][x];
function classify(world,x,y){
  const t=tileAt(world,x,y);
  if(t.type==='wall')return'wall';
  if(t.type==='console')return'console';
  if(t.type==='debris')return'debris';
  if(t.type==='airlock')return'airlock';
  return'clear';
}
const onType=(sim,ty)=>sim.world.robot&&tileAt(sim.world,sim.world.robot.x,sim.world.robot.y).type===ty;

/* ---------- execution machinery ---------- */
class StopRun extends Error{}
function maybeWin(sim){
  if(!sim.level.winAtEnd&&sim.level.win(sim)){
    sim.won=true;sim.actions.push({t:'win'});throw new StopRun();
  }
}
function opTick(sim){
  if(++sim.ops>OPS_MAX)throw new Error(`Byte executed ${OPS_MAX.toLocaleString()} operations without completing the objective, then powered down to save the battery.`);
}
const bump=(sim,k)=>{sim.counts[k]=(sim.counts[k]||0)+1;};

/* Inject __guard() into every loop body so infinite loops halt
   with a friendly error instead of freezing the tab. */
function injectGuards(src){
  let out='',i=0;
  while(i<src.length){
    const ch=src[i];
    if(ch==='"'||ch==="'"||ch==='`'){const q=ch;out+=ch;i++;
      while(i<src.length){if(src[i]==='\\'){out+=src[i]+(src[i+1]??'');i+=2;continue;}out+=src[i];if(src[i]===q){i++;break;}i++;}continue;}
    if(ch==='/'&&src[i+1]==='/'){while(i<src.length&&src[i]!=='\n')out+=src[i++];continue;}
    if(ch==='/'&&src[i+1]==='*'){while(i<src.length&&!(src[i]==='*'&&src[i+1]==='/'))out+=src[i++];out+='*/';i+=2;continue;}
    if(/[A-Za-z_$]/.test(ch)){
      let j=i;while(j<src.length&&/[A-Za-z0-9_$]/.test(src[j]))j++;
      const word=src.slice(i,j);
      const prev=out.length?out[out.length-1]:'';
      out+=word;i=j;
      if(/[A-Za-z0-9_$.]/.test(prev))continue; // part of a longer identifier / property
      if(word==='for'||word==='while'){
        while(i<src.length&&/\s/.test(src[i]))out+=src[i++];
        if(src[i]!=='(')continue;
        let depth=0;
        do{if(src[i]==='(')depth++;else if(src[i]===')')depth--;out+=src[i++];}while(i<src.length&&depth>0);
        while(i<src.length&&/\s/.test(src[i]))out+=src[i++];
        if(src[i]==='{'){out+='{__guard();';i++;}
        else if(src[i]===';'){out+=src[i++];} // do{}while(x); or empty body
        else{ // single-statement body
          out+='{__guard();';
          let d2=0;
          while(i<src.length){const c=src[i];out+=c;
            if(c==='('||c==='['||c==='{')d2++;
            if(c===')'||c===']'||c==='}')d2--;
            i++;if(c===';'&&d2<=0)break;}
          out+='}';
        }
      }else if(word==='do'){
        while(i<src.length&&/\s/.test(src[i]))out+=src[i++];
        if(src[i]==='{'){out+='{__guard();';i++;}
      }
      continue;
    }
    out+=ch;i++;
  }
  return out;
}

function runTrial(level,seed,code){
  const world=level.build(mulberry32(seed));
  const sim={world,level,actions:[],ops:0,won:false,failed:null,compileError:false,counts:{}};
  const api=level.makeApi(sim);
  api.report=(msg)=>{opTick(sim);sim.actions.push({t:'report',msg:String(msg)});};
  let fn;
  try{
    fn=new Function(...Object.keys(api),'__guard','"use strict";\n'+injectGuards(code)+'\n');
  }catch(e){sim.failed='Syntax error — '+e.message;sim.compileError=true;return sim;}
  let g=0;
  const guard=()=>{if(++g>GUARD_MAX)throw new Error(`The program looped ${GUARD_MAX.toLocaleString()} times without finishing — that's almost certainly an infinite loop. Check your loop's exit condition.`);};
  try{fn(...Object.values(api),guard);}
  catch(e){if(!(e instanceof StopRun))sim.failed=e.message||String(e);}
  if(!sim.won&&level.winAtEnd&&level.win(sim)){sim.won=true;sim.actions.push({t:'win'});}
  return sim;
}

/* ---------- shared robot command set ---------- */
function movementApi(sim,opts={}){
  const ahead=(turn=0)=>{
    const r=sim.world.robot,d=(r.dir+turn+4)%4;
    return {x:r.x+DIRS[d][0],y:r.y+DIRS[d][1]};
  };
  const api={
    move(){opTick(sim);const p=ahead(),c=classify(sim.world,p.x,p.y);
      if(c==='debris')throw new Error('CRUNCH. Byte drove straight into debris. Chassis integrity warning — trial failed. (Byte can scan() before moving.)');
      if(c==='wall'){sim.actions.push({t:'bump'});return;}
      sim.world.robot.x=p.x;sim.world.robot.y=p.y;
      sim.actions.push({t:'move',x:p.x,y:p.y});bump(sim,'moves');maybeWin(sim);},
    turnLeft(){opTick(sim);sim.world.robot.dir=(sim.world.robot.dir+3)%4;sim.actions.push({t:'turn',dir:sim.world.robot.dir});},
    turnRight(){opTick(sim);sim.world.robot.dir=(sim.world.robot.dir+1)%4;sim.actions.push({t:'turn',dir:sim.world.robot.dir});},
  };
  if(opts.scan)api.scan=()=>{opTick(sim);const p=ahead(),c=classify(sim.world,p.x,p.y);sim.actions.push({t:'ping',x:p.x,y:p.y});bump(sim,'scans');return c;};
  if(opts.sideScan){
    api.scanLeft=()=>{opTick(sim);const p=ahead(-1),c=classify(sim.world,p.x,p.y);sim.actions.push({t:'ping',x:p.x,y:p.y});bump(sim,'scans');return c;};
    api.scanRight=()=>{opTick(sim);const p=ahead(1),c=classify(sim.world,p.x,p.y);sim.actions.push({t:'ping',x:p.x,y:p.y});bump(sim,'scans');return c;};
  }
  return api;
}
function checkIndex(i,n,fname){
  if(!Number.isInteger(i)||i<0||i>=n)
    throw new Error(`${fname}(${i}) — there is no slot ${i}. Valid indices run from 0 to ${n-1}. (Programmers count from zero.)`);
}

/* ---------- grid-graph helpers (used by Season 3 builders) ---------- */
function gridSolve(world,s,g,costFn){
  // Dijkstra over open tiles; costFn(x,y) = cost of ENTERING a tile
  // (1 everywhere = BFS). Returns {cost, route} or null if unreachable.
  const key=(x,y)=>x+','+y;
  const dist={},prev={};
  dist[key(s.x,s.y)]=0;
  const todo=[{x:s.x,y:s.y}];
  while(todo.length){
    let bi=0;
    for(let i=1;i<todo.length;i++)
      if(dist[key(todo[i].x,todo[i].y)]<dist[key(todo[bi].x,todo[bi].y)])bi=i;
    const cur=todo.splice(bi,1)[0];
    for(const [dx,dy] of DIRS){
      const nx=cur.x+dx,ny=cur.y+dy;
      if(tileAt(world,nx,ny).type==='wall')continue;
      const nd=dist[key(cur.x,cur.y)]+costFn(nx,ny);
      if(!(key(nx,ny) in dist)||nd<dist[key(nx,ny)]){
        dist[key(nx,ny)]=nd;prev[key(nx,ny)]={x:cur.x,y:cur.y};
        todo.push({x:nx,y:ny});
      }
    }
  }
  if(!(key(g.x,g.y) in dist))return null;
  const route=[];let cur={x:g.x,y:g.y};
  while(cur){route.push(cur);cur=prev[key(cur.x,cur.y)];}
  route.reverse();
  return {cost:dist[key(g.x,g.y)],route};
}
function validateRoute(world,route,s,g,fname){
  if(!Array.isArray(route)||route.length<2)
    throw new Error(`${fname}(route) expects an array of at least two {x, y} points.`);
  for(const p of route)
    if(!p||!Number.isInteger(p.x)||!Number.isInteger(p.y))
      throw new Error(`${fname}: every waypoint must be an object like {x: 3, y: 5}.`);
  if(route[0].x!==s.x||route[0].y!==s.y)
    throw new Error(`${fname}: the route must begin at the start (${s.x}, ${s.y}).`);
  const last=route[route.length-1];
  if(last.x!==g.x||last.y!==g.y)
    throw new Error(`${fname}: the route must end at the goal (${g.x}, ${g.y}).`);
  for(let i=1;i<route.length;i++){
    const a=route[i-1],b=route[i];
    if(Math.abs(a.x-b.x)+Math.abs(a.y-b.y)!==1)
      throw new Error(`${fname}: waypoint ${i} (${b.x}, ${b.y}) is not adjacent to (${a.x}, ${a.y}) — one step up/down/left/right at a time.`);
    if(tileAt(world,b.x,b.y).type==='wall')
      throw new Error(`${fname}: waypoint ${i} (${b.x}, ${b.y}) is inside debris. The drone disagrees.`);
  }
}

  starter:`// Two markers: 'prev' = last good coupler,
// 'cur' = the one being inspected.
// If cur is corroded, splice prev past it.

let prev = head();
let cur = nextOf(prev);

  if (statusOf(cur) === "corroded") {
    // point prev at whatever follows cur

  build(rng){

    while(bad.size<nBad)bad.add(ri(rng,1,9)); // never the head

  makeApi(sim){

      setNext:(id,nid)=>{opTick(sim);known(id,'setNext');
        if(nid!==null)known(nid,'setNext');
        m.next[id]=nid;bump(sim,'splices');
        const from=m.pos[id],to=nid===null?m.ids.length:m.pos[nid];
        for(const q of m.ids)
          if(m.pos[q]>from&&m.pos[q]<to&&m.status[q]==='corroded')

// drain the relay into 'waiting', then each cycle
// find and wake the pod with the HIGHEST critOf().

let waiting = [];
while (!allAwake()) {
  while (commCount() > 0) {
    waiting.push(readComm());
  }
  if (waiting.length === 0) {
    standby();
    continue;
  }
  // find the index of the most critical pod in
  // 'waiting', wake it, and remove it:
  //   waiting.splice(thatIndex, 1);
}

    const crits=[...cs];
    // first two arrivals ascend in criticality, so FIFO waking
    // fails immediately — priority is not arrival order
    if(crits[0]>crits[1])[crits[0],crits[1]]=[crits[1],crits[0]];

    for(let x=1;x<=10;x++){const t=world.tiles[1][x];t.type='pod';t.idx=ids[x-1];}

`,

    <p><b>Breadth-first search</b> is chapter 9's queue walking a graph: explore everything 1 step away, then 2, then 3. Because you expand in rings, <em>the first time you reach a tile is provably the shortest way to it</em>.</p>

/* ---- 14 · Dijkstra ---- */
{
  id:'dijkstra',title:'The Hot Zone',concept:'Dijkstra — weighted paths',
  seeds:[26,71],
  brief:[
    ['HALCYON','The hub is powered but its uplink mast is across a radiation zone. Every tile reads 1 to 9 rads. The repair crawler survives ONE route: the minimum-total-radiation route.'],
    ['BYTE','Careful, engineer: fewest tiles is NOT least radiation. A three-tile shortcut through a 9-rad pocket loses to a long corridor of 1s. Steps are no longer equal.'],
    ['YOU','So BFS breaks — its ripples count hops, not rads. New rule: always expand the CHEAPEST tile found so far. My chapter-12 max-scan, flipped to min. Queue out, priority queue in.'],
  ],
  objective:'Submit the route from the crawler (▲) to the pulsing mast tile with the minimum TOTAL radiation (sum of every tile you enter; the start tile is free). Any hotter route kills the crawler. Tile costs are printed on the map. Both trials.',
  api:[
    ['isOpen(x, y) / start() / goal()','As before.'],
    ['costOf(x, y)','Radiation absorbed by entering that tile (1–9).'],
    ['plotRoute(route)','Submit the route, one step at a time.'],
    ['The one-line upgrade','BFS takes the OLDEST queued tile; Dijkstra takes the CHEAPEST-so-far. Everything else is the same shape.'],
  ],
  starter:`// Dijkstra = BFS with a priority queue.
// dist[k] = least radiation found so far to reach k.
// Each round: take the CHEAPEST tile in 'todo'
// (linear min-scan — chapter 12), then try to improve
// its neighbours.

const DIRS = [[0,-1],[1,0],[0,1],[-1,0]];
const key = (p) => p.x + "," + p.y;

let s = start(), g = goal();
let dist = {}, cameFrom = {};
dist[key(s)] = 0;
let todo = [s];

while (todo.length > 0) {
  // 1. find index of the tile in 'todo' with the
  //    smallest dist, and splice it out as 'cur'
  // 2. for each neighbour n of cur that isOpen:
  //      let nd = dist[key(cur)] + costOf(n.x, n.y);
  //      if nd beats dist[key(n)] (or n is unseen):
  //        record nd, cameFrom, push n onto todo
}

// walk cameFrom backwards from goal(), reverse,
// plotRoute(...).
`,
  build(rng){
    for(let tries=0;tries<200;tries++){
      const world=emptyWorld(11,7);
      for(let y=1;y<6;y++)for(let x=1;x<10;x++){
        const t=world.tiles[y][x];
        if(rng()<0.10){t.type='wall';continue;}
        t.type='rad';t.cost=ri(rng,1,9);
      }
      const s={x:1,y:5},g={x:9,y:1};
      const st=world.tiles[s.y][s.x],gt=world.tiles[g.y][g.x];
      st.type='rad';st.cost=1;gt.type='rad';gt.cost=ri(rng,1,3);gt.goal=true;
      const costFn=(x,y)=>world.tiles[y][x].cost;
      const best=gridSolve(world,s,g,costFn);
      if(!best)continue;
      // cheapest cost achievable by ANY fewest-hops route, via
      // layered BFS DP — must be strictly worse than optimal, so
      // "just reuse BFS" fails on every trial
      const hop=gridSolve(world,s,g,()=>1);
      if(!hop)continue;
      const K=(x,y)=>x+','+y;
      const hd={},mc={};hd[K(s.x,s.y)]=0;mc[K(s.x,s.y)]=0;
      const q=[{x:s.x,y:s.y}];
      while(q.length){
        const c=q.shift();
        for(const [dx,dy] of DIRS){
          const nx=c.x+dx,ny=c.y+dy;
          if(tileAt(world,nx,ny).type==='wall')continue;
          if(!(K(nx,ny) in hd)){hd[K(nx,ny)]=hd[K(c.x,c.y)]+1;q.push({x:nx,y:ny});}
        }
      }
      const cells=Object.keys(hd).sort((a,b)=>hd[a]-hd[b]);
      for(const ck of cells){
        const [cx,cy]=ck.split(',').map(Number);
        for(const [dx,dy] of DIRS){
          const nx=cx+dx,ny=cy+dy,nk=K(nx,ny);
          if(!(nk in hd)||hd[nk]!==hd[ck]+1)continue;
          const nd=mc[ck]+costFn(nx,ny);
          if(!(nk in mc)||nd<mc[nk])mc[nk]=nd;
        }
      }
      if(!(K(g.x,g.y) in mc)||mc[K(g.x,g.y)]<=best.cost)continue;
      world.robot={x:s.x,y:s.y,dir:0};
      world.meta={s,g,best:best.cost,routed:false};
      return world;
    }
    throw new Error('zone generation failed');
  },
  makeApi(sim){
    const m=sim.world.meta;
    return {
      isOpen:(x,y)=>{opTick(sim);const t=tileAt(sim.world,x,y);return t.type!=='wall';},
      costOf:(x,y)=>{opTick(sim);const t=tileAt(sim.world,x,y);
        if(t.type!=='rad')throw new Error(`costOf(${x}, ${y}) — that tile is debris or outside the zone. Check isOpen first.`);
        return t.cost;},
      start:()=>{opTick(sim);return {x:m.s.x,y:m.s.y};},
      goal:()=>{opTick(sim);return {x:m.g.x,y:m.g.y};},
      plotRoute:(route)=>{opTick(sim);
        validateRoute(sim.world,route,m.s,m.g,'plotRoute');
        let total=0;
        for(let i=1;i<route.length;i++)total+=sim.world.tiles[route[i].y][route[i].x].cost;
        if(total>m.best)throw new Error(`That route absorbs ${total} rads — a ${m.best}-rad route exists. Fewest tiles is not least radiation: expand the CHEAPEST tile first, not the oldest. Trial failed.`);
        sim.counts.rads=total;
        for(let i=1;i<route.length;i++)sim.actions.push({t:'mark',x:route[i].x,y:route[i].y,cls:'ok'});
        m.routed=true;maybeWin(sim);},
    };
  },
  win(sim){return sim.world.meta.routed===true;},
  success:'The crawler reaches the mast with dosimeter to spare and the uplink blinks alive. Halfway there.',
  card:{title:'Dijkstra: when steps aren\'t equal',body:`
    <p>You changed ONE decision — take the <em>cheapest-known</em> tile instead of the <em>oldest</em> — and BFS became <b>Dijkstra's algorithm</b>, the foundation of routing on weighted graphs. Swap the queue for a priority queue; the rest of the shape survives.</p>
    <p>Your linear min-scan makes each pick O(n); a heap makes it O(log n). And if you add a "roughly how far to the goal?" hunch to the priority, Dijkstra becomes <b>A*</b> — the version games and robots use.</p>
    <div class="real"><div class="bt">In the wild</div>GPS with traffic (time as weight, not distance), internet packet routing (OSPF literally runs Dijkstra), flight-price searches, power-grid planning. Arguably the most economically valuable 30 lines of code ever written.</div>`},
},

/* ---- 15 · topological sort ---- */
{
  id:'topo',title:'Restart Sequence',concept:'Topological sort',
  seeds:[38,74,97],
  brief:[
    ['HALCYON','Last step, engineer: the relay station itself. Nine systems, all dark, and every one refuses to start before the systems it depends on. NAV before COM, power before everything…'],
    ['BYTE','The dependency list is honest but unordered. Start a system too early and the cascade trips every breaker on the station. There is no partial credit on this one.'],
    ['YOU','It\'s a graph again — arrows meaning "needs". Keep sweeping the list: anything whose dependencies are all up, start it. Repeat until nothing is dark. If a sweep starts nothing… that would mean a dependency loop. Let\'s hope command didn\'t build one.'],
  ],
  objective:'Restart all 9 systems in a valid dependency order: restart(id) fails if any of its dependsOn(id) systems is still down. The dependency graph reshuffles every trial — compute the order, don\'t memorize it. (Each system\'s requirements are printed in the console.)',
  api:[
    ['systemsList()','The 9 system codes, in no useful order.'],
    ['dependsOn(id)','Codes that must be up BEFORE id can start (possibly none).'],
    ['restart(id)','Start a system. Any dependency still down = station-wide cascade.'],
    ['report(msg)','Print a message.'],
  ],
  starter:`// Sweep the list repeatedly:
// start anything whose dependencies are ALL up,
// until everything is up. (Track what's up in an
// object — chapter 11's trick.)

const all = systemsList();
let up = {};
let started = 0;

while (started < all.length) {
  for (const s of all) {
    if (up[s]) continue;
    // is every code in dependsOn(s) already up?
    // if yes: restart(s); up[s] = true; started++;
  }
}
`,
  build(rng){
    const world=emptyWorld(11,3);
    const codes=['RCT','NAV','COM','LIF','SHD','SEN','DOK','GRV','BCN'];
    const topo=[...codes];
    for(let i=topo.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[topo[i],topo[j]]=[topo[j],topo[i]];}
    const deps={};deps[topo[0]]=[];
    for(let i=1;i<topo.length;i++){
      const n=Math.min(i,ri(rng,1,2)),pick=new Set();
      while(pick.size<n)pick.add(topo[ri(rng,0,i-1)]);
      deps[topo[i]]=[...pick];
    }
    // display order must NOT itself be a valid restart order,
    // so "just restart them in list order" fails every trial
    let display;
    do{
      display=[...codes];
      for(let i=display.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[display[i],display[j]]=[display[j],display[i]];}
    }while(display.every((s,i)=>deps[s].every(d=>display.indexOf(d)<i)));
    for(let x=1;x<=9;x++){const t=world.tiles[1][x];t.type='sys';t.pid=display[x-1];}
    world.meta={display,deps,up:new Set()};
    return world;
  },
  makeApi(sim){
    const m=sim.world.meta;
    for(const s of m.display)
      if(m.deps[s].length)
        sim.actions.push({t:'note',msg:`${s} requires: ${m.deps[s].join(', ')}`});
    const posOf=(id)=>m.display.indexOf(id)+1;
    return {
      systemsList:()=>{opTick(sim);return [...m.display];},
      dependsOn:(id)=>{opTick(sim);
        if(!(id in m.deps))throw new Error(`dependsOn(${JSON.stringify(id)}) — no system has that code.`);
        return [...m.deps[id]];},
      restart:(id)=>{opTick(sim);
        if(!(id in m.deps))throw new Error(`restart(${JSON.stringify(id)}) — no system has that code.`);
        if(m.up.has(id))throw new Error(`restart("${id}") — it is already up.`);
        for(const d of m.deps[id])
          if(!m.up.has(d))throw new Error(`CASCADE. ${id} drew power before ${d} was up, and every breaker on the station just tripped. Trial failed.`);
        m.up.add(id);bump(sim,'restarts');
        sim.actions.push({t:'mark',x:posOf(id),y:1,cls:'ok'});
        sim.actions.push({t:'note',msg:`${id} online  (${m.up.size}/9)`});
        maybeWin(sim);},
    };
  },
  win(sim){return sim.world.meta.up.size===9;},
  success:'BCN lights last, and the relay network ripples awake across the sector — seventeen stranded ships pick up nav-lock within the minute.',
  card:{title:'Topological sort: dependency order',body:`
    <p>A graph where arrows mean "needs" is a <b>dependency graph</b>, and an order that satisfies every arrow is a <b>topological sort</b>. Your repeated sweep is the honest version of <b>Kahn's algorithm</b>: start what's unblocked, repeat.</p>
    <p>And your worry was correct: if a sweep ever starts nothing while systems are still down, the graph has a <em>cycle</em> — A needs B needs A — and no valid order exists at all. You'll meet that in real life as "circular dependency detected".</p>
    <div class="real"><div class="bt">In the wild</div>Build systems (make, Gradle, cargo) deciding compile order, package managers resolving installs, spreadsheets recalculating cells, CI pipelines, course prerequisites — any "this before that" problem is this exact graph.</div>`},
},
];

/* ============================================================
   UI
   ============================================================ */
const $=(s)=>document.querySelector(s);
const gridEl=$('#grid'),consoleEl=$('#console'),editor=$('#editor'),overlay=$('#overlay');
let cur=0,unlocked=+(localStorage.getItem('cs_unlocked')||0),running=false;
let viewWorld=null,robotEl=null,tileEls=[];
const SPEEDS=[1,2,4];let speedIdx=0;
const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));
const delay=(base)=>CS.instant?0:base/SPEEDS[speedIdx];

/* ---------- console ---------- */
function cline(msg,cls='c-info'){
  const d=document.createElement('div');d.className=cls;d.textContent=msg;
  consoleEl.appendChild(d);
  while(consoleEl.children.length>250)consoleEl.removeChild(consoleEl.firstChild);
  consoleEl.scrollTop=consoleEl.scrollHeight;
}
const cclear=()=>{consoleEl.innerHTML='';};

/* ---------- world rendering ---------- */
function tileClasses(t){
  let c='tile t-'+t.type;
  if(t.revealed)c+=' revealed';
  if(t.revealCls)c+=' '+t.revealCls;
  if(t.fixed)c+=' fixed';
  if(t.opened==='ok')c+=' open-ok';
  if(t.opened==='bad')c+=' open-bad';
  if(t.sorted)c+=' sorted';
  if(t.corrupt)c+=' corrupt';
  if(t.type==='rad'&&t.cost!=null)c+=' rad-'+(t.cost>=7?'h':t.cost>=4?'m':'l');
  if(t.goal)c+=' goalcell';
  if(t.mark)c+=' mark-'+t.mark;
  return c;
}
function renderTile(x,y){
  const t=viewWorld.tiles[y][x],el=tileEls[y][x];
  el.className=tileClasses(t);
  let lbl='';
  if(t.type==='cell'||t.type==='cabinet'||t.type==='crate'||t.type==='seal'||t.type==='record')lbl=t.revealed?t.label:'?';
  if(t.type==='pod')lbl=t.revealed?t.label:(t.pid??'?');
  if(t.type==='node')lbl=String(t.pid);
  if(t.type==='rad')lbl=String(t.cost);
  if(t.type==='sys')lbl=t.pid;
  el.querySelector('.tlabel').textContent=lbl;
}
function updateRobot(){
  if(!viewWorld.robot){robotEl.style.display='none';return;}
  robotEl.style.display='block';
  const r=viewWorld.robot;
  robotEl.style.transform=`translate(${r.x*PITCH}px,${r.y*PITCH}px)`;
  robotEl.querySelector('.body').style.transform=`rotate(${r.dir*90}deg)`;
}
function renderWorld(world){
  viewWorld=world;
  gridEl.innerHTML='';
  gridEl.style.gridTemplateColumns=`repeat(${world.w},${TILE}px)`;
  tileEls=[];
  for(let y=0;y<world.h;y++){
    tileEls.push([]);
    for(let x=0;x<world.w;x++){
      const el=document.createElement('div');
      const lb=document.createElement('span');lb.className='tlabel';
      el.appendChild(lb);gridEl.appendChild(el);tileEls[y].push(el);
    }
  }
  robotEl=document.createElement('div');robotEl.id='robot';
  robotEl.innerHTML='<div class="body"></div>';
  gridEl.appendChild(robotEl);
  for(let y=0;y<world.h;y++)for(let x=0;x<world.w;x++){
    const t=world.tiles[y][x];
    if(t.idx!==undefined||t.type==='cabinet'||t.type==='crate'){
      const ix=document.createElement('span');ix.className='tidx';
      ix.textContent=String(t.idx!==undefined?t.idx:x-1);tileEls[y][x].appendChild(ix);
    }
    renderTile(x,y);
  }
  updateRobot();
}

/* ---------- action replay ---------- */
async function applyAction(a){
  switch(a.t){
    case 'move':viewWorld.robot.x=a.x;viewWorld.robot.y=a.y;updateRobot();await sleep(delay(130));break;
    case 'turn':viewWorld.robot.dir=a.dir;updateRobot();await sleep(delay(110));break;
    case 'bump':robotEl.classList.add('bump');cline('· clunk — that\'s a wall.','c-warn');
      await sleep(delay(200));robotEl.classList.remove('bump');break;
    case 'ping':{const el=tileEls[a.y]?.[a.x];if(el){el.classList.add('ping');await sleep(delay(90));el.classList.remove('ping');}break;}
    case 'reveal':{const t=viewWorld.tiles[a.y][a.x];t.revealed=true;t.label=a.label;if(a.cls)t.revealCls=a.cls;
      renderTile(a.x,a.y);await sleep(delay(220));break;}
    case 'fix':{const t=viewWorld.tiles[a.y][a.x];t.fixed=true;renderTile(a.x,a.y);
      cline('» replacement cell seated. voltage nominal.','c-ok');await sleep(delay(300));break;}
    case 'open':{const t=viewWorld.tiles[a.y][a.x];t.opened=a.ok?'ok':'bad';renderTile(a.x,a.y);await sleep(delay(300));break;}
    case 'swap':{const A=viewWorld.tiles[1][a.i+1],B=viewWorld.tiles[1][a.j+1];
      [A.weight,B.weight]=[B.weight,A.weight];
      [A.label,B.label]=[B.label,A.label];
      [A.revealed,B.revealed]=[B.revealed,A.revealed];
      renderTile(a.i+1,1);renderTile(a.j+1,1);await sleep(delay(240));break;}
    case 'report':cline('» '+a.msg,'c-report');await sleep(delay(60));break;
    case 'note':cline('· '+a.msg,'c-info');await sleep(delay(90));break;
    case 'mark':{const t=viewWorld.tiles[a.y][a.x];t.mark=a.cls;renderTile(a.x,a.y);await sleep(delay(220));break;}
    case 'win':if(viewWorld.robot){robotEl.classList.add('win');}
      for(let y=0;y<viewWorld.h;y++)for(let x=0;x<viewWorld.w;x++){
        const t=viewWorld.tiles[y][x];
        if(t.type==='crate'){t.sorted=true;renderTile(x,y);}
        if(t.type==='node'&&!t.corrupt){t.mark='ok';renderTile(x,y);}
      }
      await sleep(delay(350));break;
  }
}
async function replayTrial(level,seed,actions){
  renderWorld(level.build(mulberry32(seed)));
  await sleep(delay(300));
  for(const a of actions)await applyAction(a);
}

/* ---------- run flow ---------- */
function countCodeLines(code){
  return code.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('//')).length;
}
function statsOf(sim){
  const parts=[];
  for(const[k,v]of Object.entries(sim.counts))parts.push(`${k}: ${v}`);
  return parts.join(', ');
}
async function runProgram(){
  if(running)return false;
  running=true;$('#runBtn').disabled=true;
  try{
    cclear();
    const level=LEVELS[cur],code=editor.value;
    localStorage.setItem('cs_code_'+level.id,code);
    if(level.lineBudget){
      const n=countCodeLines(code);
      if(n>level.lineBudget){
        cline(`✗ Uplink buffer overflow: your program is ${n} lines; the buffer holds ${level.lineBudget}.`,'c-err');
        cline('  Byte: "The stairwell repeats itself. Perhaps your code should too — with a loop."','c-warn');
        return false;
      }
    }
    const sims=level.seeds.map(s=>runTrial(level,s,code));
    if(sims[0].compileError){cline('✗ '+sims[0].failed,'c-err');return false;}
    const failIdx=sims.findIndex(s=>!s.won);
    const showIdx=failIdx===-1?0:failIdx;
    cline(`▶ Uploading program… running ${sims.length} trial${sims.length>1?'s':''}. Replaying trial ${showIdx+1}.`);
    await replayTrial(level,level.seeds[showIdx],sims[showIdx].actions);
    sims.forEach((s,i)=>{
      if(s.won)cline(`✓ Trial ${i+1}: objective complete${statsOf(s)?'  ('+statsOf(s)+')':''}`,'c-ok');
      else cline(`✗ Trial ${i+1}: ${s.failed||'program ended before the objective was met.'}`,'c-err');
    });
    if(failIdx===-1){
      cline('',''); cline('✓ CHAPTER COMPLETE — '+level.success,'c-ok');
      if(cur>=unlocked){unlocked=cur+1;localStorage.setItem('cs_unlocked',unlocked);}
      renderChips();
      if(!CS.instant){await sleep(700);showCard(level);}
      return true;
    }
    return false;
  }finally{running=false;$('#runBtn').disabled=false;}
}

function showS1End(){
  openModal('Season 1 complete · Signal Lost','Signal restored. The crew is not.',`
    <p>HALCYON is back online, and you — six weeks into the job — just debugged a starship with five classic algorithms:</p>
    <ul>
      <li><b>Sequences, loops, conditionals</b> — the three moves every program is made of.</li>
      <li><b>Linear search</b> — O(n): check everything, works anywhere.</li>
      <li><b>Binary search</b> — O(log n): sorted data turns a million checks into twenty.</li>
      <li><b>Sorting</b> — O(n²) by hand: the price you pay so search can be cheap.</li>
      <li><b>Pathfinding</b> — your first graph algorithm, three lines of wall-hugging logic.</li>
    </ul>
    <p>But 30 crew members are still frozen behind the cryo bay hatch, and waking them safely is not an algorithms problem. It's about <em>how you hold the data</em>: piles, lines, chains, tables.</p>
    <div class="real"><div class="bt">Season 2 · Cold Storage</div>Stacks, queues, linked lists, hash maps, priority queues — the five containers that, with Season 1's algorithms, make up most of an engineer's daily toolkit.</div>`,
    'Begin Season 2: Cold Storage ▸',()=>loadLevel(7));
}
function showS2End(){
  openModal('Season 2 complete · Cold Storage','All hands awake.',`
    <p>The Captain reads the repair log twice. Here's the toolkit you shipped in Season 2 — the five containers that hold everything else up:</p>
    <ul>
      <li><b>Stack</b> — last in, first out: undo, backtracking, the call stack.</li>
      <li><b>Queue</b> — first in, first out: buffering fast producers for slow consumers.</li>
      <li><b>Linked list</b> — the chain is the data: cheap splices, two-pointer walks.</li>
      <li><b>Hash map</b> — pay one pass, answer in O(1) forever. The workhorse.</li>
      <li><b>Priority queue</b> — the most urgent thing, always; heaps make it fast.</li>
    </ul>
    <p>Then the comms officer sits down at her console, and her face falls. The Meridian is fixed — but the sector's relay network is dark, and seventeen other ships are stranded in the same storm wreckage.</p>
    <div class="real"><div class="bt">Season 3 · The Relay Network</div>Everything out there — debris fields, power routing, restart dependencies — is a <b>graph</b>. And you already own every part these algorithms are built from.</div>`,
    'Begin Season 3: The Relay Network ▸',()=>loadLevel(12));
}
function showFinale(){
  openModal('Transmission · Sector Command','Sector clear, Chief Engineer.',`
    <p>Seventeen ships lock nav within the minute. The Captain makes it official on the spot: field promotion, effective immediately. Fifteen chapters ago you were six weeks into your first engineering job. Look at the log you shipped:</p>
    <ul>
      <li><b>Season 1</b> — sequences, loops, conditionals, linear &amp; binary search, sorting, pathfinding.</li>
      <li><b>Season 2</b> — stacks, queues, linked lists, hash maps, priority queues.</li>
      <li><b>Season 3</b> — BFS, Dijkstra, topological sort: the graph algorithms, each built from Season 1 + 2 parts.</li>
    </ul>
    <p>That's not a game curriculum — that's the core of a CS fundamentals semester and the overwhelming majority of what technical interviews test.</p>
    <div class="real"><div class="bt">Your real Season 4</div>It runs outside this game: (1) re-implement BFS and a hash-map word counter from memory in JavaScript or Python; (2) work through a set of "easy" interview problems — you'll recognize almost every one; (3) build something real and small, end to end. HALCYON's last fragment, for the road: <em>you were never learning to program a robot — the robot was how you learned to think in steps, structures, and graphs.</em></p>
    <p>Replay any chapter from the bar above. The layouts reshuffle; your programs won't mind.</p>`,
    'End transmission',null);
}
function showS3Intro(){
  openModal('Season 3 · The Relay Network','Seventeen ships are waiting on you.',`
    <p>The Meridian flies and the crew is awake — but the storm killed the sector's relay network, and every other ship out here is blind. Command's orders: restore it. Debris fields, radiation zones, dependency-locked stations.</p>
    <p>Season 1 gave you algorithms; Season 2 gave you structures. Season 3 is where they combine: every problem this season is a <b>graph</b>, and every solution is built from parts you already own — a queue, a hash map, a min-scan.</p>
    <ul>
      <li>These are the hardest chapters. The starters scaffold more; the ideas are worth it.</li>
      <li>Same rules: randomized trials. Compute answers, don't memorize them.</li>
    </ul>`,
    'Plot the first jump ▸',null);
}
function showS2Intro(){
  openModal('Season 2 · Cold Storage','30 crew. 3% oxygen margin. Your move.',`
    <p>The ship flies, but the crew is still frozen — and cryo revival is not a "clever algorithm" problem. Seals must come off in reverse, alarms must be answered in order, fluid chains must be spliced, manifests must be searched <em>fast</em>.</p>
    <p>Season 1 taught you how to <b>compute on</b> data. Season 2 is about how to <b>hold</b> it: this season, the JavaScript you already know — arrays and objects — turns out to secretly be every data structure you need.</p>
    <ul>
      <li>Same rules: randomized trials, real constraints, no memorized answers.</li>
      <li>New this season: no robot to drive — you work the ship's systems directly.</li>
    </ul>`,
    'Open the cryo deck ▸',null);
}
function showIntro(){
  openModal('Incoming transmission','You are the only engineer awake.',`
    <p>The deep-space freighter <b>Meridian</b> hit a debris storm. The ship's AI, HALCYON, is fragmented. The crew is in cryo. You — the newest engineer aboard, first job after switching careers — are awake.</p>
    <p>Your one tool: <b>Byte</b>, a maintenance robot that executes any JavaScript you upload. Each chapter, you'll write a small program; the ship will test it on <em>randomized</em> layouts, so memorized answers fail and real algorithms win.</p>
    <ul>
      <li>Write code in the editor, then press <b>▶ Run</b> (or Ctrl/Cmd + Enter).</li>
      <li>Byte's command set for each chapter is listed on the left.</li>
      <li>Stuck? The starter code and HALCYON's fragments always contain the idea.</li>
    </ul>`,
    'Wake up Byte ▸',null);
}

/* ---------- level loading / chrome ---------- */
function renderChips(){
  const nav=$('#chips');nav.innerHTML='';
  LEVELS.forEach((lv,i)=>{
    if(i===7||i===12){
      const s=document.createElement('span');s.className='sdiv';
      s.textContent=i===7?'S2':'S3';
      s.title=i===7?'Season 2: Cold Storage':'Season 3: The Relay Network';
      nav.appendChild(s);
    }
    const b=document.createElement('button');
    b.className='chip'+(i===cur?' cur':'')+(i<unlocked?' done':'');
    b.textContent=String(i+1);
    b.title=`Chapter ${i+1}: ${lv.title} — ${lv.concept}`;
    b.disabled=i>unlocked;
    b.addEventListener('click',()=>loadLevel(i));
    nav.appendChild(b);
  });
}
function loadLevel(i){
  cur=i;
  const lv=LEVELS[i];
  const season=i<7?1:i<12?2:3;
  document.querySelector('.brand .sub').textContent=['SIGNAL LOST','COLD STORAGE','THE RELAY NETWORK'][season-1];
  $('#lv-kicker').textContent=`Season ${season} · Chapter ${i+1} of ${LEVELS.length}`;
  $('#lv-title').textContent=lv.title;
  $('#lv-concept').textContent=lv.concept;
  $('#fname').textContent=`chapter_${i+1}.js`;
  const comms=$('#lv-comms');comms.innerHTML='';
  for(const [who,say] of lv.brief){
    const d=document.createElement('div');
    d.className=who.toLowerCase();
    const w=document.createElement('div');w.className='who';w.textContent=who;
    const s=document.createElement('div');s.className='say';s.textContent=say;
    d.appendChild(w);d.appendChild(s);comms.appendChild(d);
  }
  $('#lv-objective').textContent=lv.objective;
  $('#lv-budget').textContent=lv.lineBudget?`⚠ Uplink buffer: max ${lv.lineBudget} lines of code.`:'';
  const apiEl=$('#lv-api');apiEl.innerHTML='';
  for(const [sig,doc] of lv.api){
    const d=document.createElement('div');d.className='fn';
    const s=document.createElement('div');s.className='sig';s.textContent=sig;
    const dd=document.createElement('div');dd.className='doc';dd.textContent=doc;
    d.appendChild(s);d.appendChild(dd);apiEl.appendChild(d);
  }
  $('#hud').innerHTML=`DECK ${i+1} · <b>${lv.title.toUpperCase()}</b> · TRIALS: ${lv.seeds.length}`;
  editor.value=localStorage.getItem('cs_code_'+lv.id)??lv.starter;
  cclear();
  cline(`— Chapter ${i+1}: ${lv.title} —`);
  cline('Byte is standing by. Press ▶ Run to upload your program.');
  renderWorld(lv.build(mulberry32(lv.seeds[0])));
  renderChips();
  if(i===7&&!localStorage.getItem('cs_seen_s2')&&!CS.instant){
    localStorage.setItem('cs_seen_s2','1');
    showS2Intro();
  }
  if(i===12&&!localStorage.getItem('cs_seen_s3')&&!CS.instant){
    localStorage.setItem('cs_seen_s3','1');
    showS3Intro();
  }
}

/* ---------- wiring ---------- */
$('#runBtn').addEventListener('click',runProgram);
$('#resetBtn').addEventListener('click',()=>{
  editor.value=LEVELS[cur].starter;
  localStorage.removeItem('cs_code_'+LEVELS[cur].id);
  cline('· starter code restored.','c-warn');
});
$('#speed').addEventListener('click',()=>{
  speedIdx=(speedIdx+1)%SPEEDS.length;
  $('#speed').textContent='SPEED '+SPEEDS[speedIdx]+'×';
});
editor.addEventListener('keydown',(e)=>{
  if(e.key==='Tab'){e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'  '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+2;}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runProgram();}
});

/* debug / test hooks */
const CS={levels:LEVELS,load:loadLevel,run:runProgram,instant:false,
  runCode:async(code)=>{editor.value=code;return runProgram();},
  get cur(){return cur;},get unlocked(){return unlocked;}};
window.CS=CS;

/* boot */
loadLevel(Math.min(unlocked,LEVELS.length-1));
if(!localStorage.getItem('cs_seen_intro')){
  localStorage.setItem('cs_seen_intro','1');
  showIntro();
}
</script>
<!-- ARTIFACT-END -->
</body>
